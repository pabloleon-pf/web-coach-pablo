<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal del Atleta | Coach León</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #ffffff;
        }
    </style>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <!-- Add Firebase products that you want to use -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCdgdlZ9DHy6c3joXiWbWqUJJ4cPAwJeMc",
            authDomain: "webcoachleon.firebaseapp.com",
            projectId: "webcoachleon",
            storageBucket: "webcoachleon.firebasestorage.app",
            messagingSenderId: "1010557067374",
            appId: "1:1010557067374:web:d22ec870bc6165e1fd867f"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        // Icons as robust SVGs inline
        const IconUser = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>;
        const IconLock = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></svg>;
        const IconActivity = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg>;
        const IconTrendingUp = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17" /><polyline points="16 7 22 7 22 13" /></svg>;
        const IconCalendar = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></svg>;
        const IconZap = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></svg>;
        const IconTarget = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></svg>;
        const IconLogOut = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></svg>;
        const IconArrowUp = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="19" x2="12" y2="5" /><polyline points="5 12 12 5 19 12" /></svg>;

        const TrendBadge = ({ current, previous, reverseLogic = false }) => {
            if (!current || !previous) return null;
            const currVal = parseFloat(current);
            const prevVal = parseFloat(previous);
            if (isNaN(currVal) || isNaN(prevVal)) return null;

            const diffValue = currVal - prevVal;
            if (diffValue === 0) return null;

            // For metrics where lower is better (like sprint time), reverseLogic would be true.
            // But for these metrics (strength, jump height), higher is generally better.
            const isPositive = diffValue > 0;
            const diffFormatted = diffValue % 1 === 0 ? diffValue : diffValue.toFixed(1);

            return (
                <span className={`flex items-center text-xs font-semibold px-1.5 py-0.5 rounded border ${isPositive ? 'text-green-500 bg-green-500/10 border-green-500/20' : 'text-red-500 bg-red-500/10 border-red-500/20'}`}>
                    {isPositive ? <IconArrowUp className="w-3 h-3 mr-0.5" /> : <IconArrowDown className="w-3 h-3 mr-0.5" />}
                    {isPositive ? '+' : ''}{diffFormatted}
                </span>
            );
        };

        const IconArrowDown = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19" /><polyline points="19 12 12 19 5 12" /></svg>;

        const LoginView = () => {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [name, setName] = useState(''); // Only for signup
            const [error, setError] = useState('');
            const [msg, setMsg] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setMsg('');
                setLoading(true);
                try {
                    if (isLogin) {
                        await auth.signInWithEmailAndPassword(email, password);
                    } else {
                        // Sign up
                        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                        // Create initial pending document in Firestore
                        await db.collection("athletes").doc(userCredential.user.email).set({
                            email: userCredential.user.email,
                            name: name || 'Atleta Nuevo',
                            status: 'Pendiente',
                            profileImg: '',
                            summary: { bodyWeight: '', relativeStrength: '', nextGoal: '' },
                            evaluations: []
                        });
                        setMsg("Cuenta creada. Espera la confirmación de Coach León.");
                    }
                } catch (err) {
                    if (err.code === 'auth/email-already-in-use') {
                        setError("El correo ya está registrado. Intenta iniciar sesión.");
                    } else if (err.code === 'auth/weak-password') {
                        setError("La contraseña debe tener al menos 6 caracteres.");
                    } else {
                        setError(isLogin ? "Correo o contraseña incorrectos." : "Error al crear cuenta. Intenta de nuevo.");
                    }
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-slate-950 flex flex-col justify-center items-center p-4">
                    <div className="w-full max-w-sm">
                        <div className="text-center mb-10">
                            <h1 className="text-3xl font-bold text-white tracking-tight">
                                Coach<span className="text-orange-500">León</span>
                            </h1>
                            <p className="text-slate-400 mt-2 text-sm uppercase tracking-widest font-semibold">
                                Portal del Atleta
                            </p>
                        </div>

                        <div className="bg-slate-900 rounded-2xl p-6 border border-slate-800 shadow-2xl">
                            <form onSubmit={handleSubmit} className="space-y-5">

                                {!isLogin && (
                                    <div>
                                        <label className="block text-slate-400 text-xs uppercase tracking-wider mb-2">Nombre Completo</label>
                                        <div className="relative">
                                            <input
                                                type="text"
                                                value={name}
                                                onChange={(e) => setName(e.target.value)}
                                                className="w-full bg-slate-950 border border-slate-800 rounded-lg py-3 px-4 text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-colors"
                                                placeholder="Ej. Juan Pérez"
                                                required={!isLogin}
                                            />
                                        </div>
                                    </div>
                                )}

                                <div>
                                    <label className="block text-slate-400 text-xs uppercase tracking-wider mb-2">Correo Electrónico</label>
                                    <div className="relative">
                                        <IconUser className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500" />
                                        <input
                                            type="email"
                                            value={email}
                                            onChange={(e) => setEmail(e.target.value)}
                                            className="w-full bg-slate-950 border border-slate-800 rounded-lg py-3 pl-10 pr-4 text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-colors"
                                            placeholder="atleta@correo.com"
                                            required
                                        />
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-slate-400 text-xs uppercase tracking-wider mb-2">Contraseña</label>
                                    <div className="relative">
                                        <IconLock className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500" />
                                        <input
                                            type="password"
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            className="w-full bg-slate-950 border border-slate-800 rounded-lg py-3 pl-10 pr-4 text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-colors"
                                            placeholder="••••••••"
                                            required
                                        />
                                    </div>
                                </div>

                                {error && <p className="text-red-500 text-sm text-center bg-red-500/10 py-2 rounded">{error}</p>}
                                {msg && <p className="text-green-500 text-sm text-center bg-green-500/10 py-2 rounded">{msg}</p>}

                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 rounded-lg transition-colors mt-4 shadow-lg shadow-orange-600/20 disabled:opacity-50"
                                >
                                    {loading ? 'Procesando...' : (isLogin ? 'Iniciar Sesión' : 'Crear Cuenta')}
                                </button>

                                <div className="text-center mt-4">
                                    <button type="button" onClick={() => { setIsLogin(!isLogin); setError(''); setMsg(''); }} className="text-sm text-slate-400 hover:text-white transition-colors">
                                        {isLogin ? '¿No tienes cuenta? Regístrate aquí' : '¿Ya tienes cuenta? Inicia Sesión'}
                                    </button>
                                </div>
                            </form>
                        </div>

                        <p className="text-center text-slate-500 text-xs mt-8 px-4 leading-relaxed">
                            El acceso es exclusivo para atletas activos. Las cuentas nuevas permanecen en estado <span className="text-orange-500 font-medium">'Pendiente'</span> hasta la aprobación de Coach León.
                        </p>
                    </div>
                </div>
            );
        };

        const DashboardView = ({ onLogout, data }) => {

            // Extract latest and previous evaluations for dynamic comparison
            const evals = data.evaluations ? [...data.evaluations] : [];

            // Helper to parse dates like DD/MM/YYYY into a comparable number
            const parseDate = (dateStr) => {
                if (!dateStr) return 0;
                const parts = dateStr.split('/');
                if (parts.length === 3) {
                    return new Date(parts[2], parts[1] - 1, parts[0]).getTime();
                }
                const parsed = Date.parse(dateStr);
                return isNaN(parsed) ? 0 : parsed;
            };

            // Ensure chronological order
            evals.sort((a, b) => parseDate(a.date) - parseDate(b.date));

            const latestEval = evals.length > 0 ? evals[evals.length - 1] : null;
            const prevEval = evals.length > 1 ? evals[evals.length - 2] : null;

            // Helper to get the most recent valid metric data
            const getMetric = (category, metric, field = 'current') => {
                const history = [];
                for (let i = evals.length - 1; i >= 0; i--) {
                    const e = evals[i];
                    if (e[category] && e[category][metric] && e[category][metric][field] && e[category][metric][field] !== '') {
                        history.push(e[category][metric][field]);
                        if (history.length === 2) break;
                    }
                }
                return {
                    current: history.length > 0 ? history[0] : null,
                    previous: history.length > 1 ? history[1] : null
                };
            };

            return (
                <div className="min-h-screen bg-slate-950 text-white pb-10">
                    <header className="sticky top-0 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 z-10 px-4 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <img src={data.profileImg || `https://api.dicebear.com/7.x/avataaars/svg?seed=${data.name}&backgroundColor=f97316`} alt="Perfil" className="w-12 h-12 rounded-full border-2 border-slate-700 bg-slate-800" />
                            <div>
                                <h2 className="text-lg font-bold">Hola, {data.name}</h2>
                                <div className="flex items-center gap-1.5 mt-0.5">
                                    <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                    <span className="text-xs text-green-400 font-medium tracking-wide">{data.status || 'Activo'}</span>
                                </div>
                            </div>
                        </div>
                        <button onClick={onLogout} className="p-2 text-slate-400 hover:text-white transition-colors bg-slate-800 rounded-lg" title="Cerrar Sesión">
                            <IconLogOut className="w-5 h-5" />
                        </button>
                    </header>

                    <main className="p-4 space-y-6 max-w-lg mx-auto mt-2">
                        <div className="grid grid-cols-3 gap-3">
                            <div className="bg-slate-900 border border-slate-800 rounded-xl p-3 flex flex-col items-center justify-center text-center">
                                <IconActivity className="w-5 h-5 text-orange-500 mb-2" />
                                <span className="text-[10px] text-slate-400 uppercase tracking-widest block mb-1">Peso</span>
                                <span className="font-bold text-lg">{data.summary?.bodyWeight || '-'}</span>
                            </div>
                            <div className="bg-slate-900 border border-slate-800 rounded-xl p-3 flex flex-col items-center justify-center text-center">
                                <IconTrendingUp className="w-5 h-5 text-orange-500 mb-2" />
                                <span className="text-[10px] text-slate-400 uppercase tracking-widest block mb-1">Fza Rel.</span>
                                <span className="font-bold text-lg">{data.summary?.relativeStrength || '-'}</span>
                            </div>
                            <div className="bg-slate-900 border border-slate-800 rounded-xl p-3 flex flex-col items-center justify-center text-center">
                                <IconCalendar className="w-5 h-5 text-orange-500 mb-2" />
                                <span className="text-[10px] text-slate-400 uppercase tracking-widest block mb-1">Objetivo</span>
                                <span className="font-bold text-sm leading-tight">{data.summary?.nextGoal || '-'}</span>
                            </div>
                        </div>

                        {!latestEval ? (
                            <div className="text-center p-10 border-2 border-dashed border-slate-800 rounded-2xl">
                                <p className="text-slate-400">Aún no hay evaluaciones registradas para ti.</p>
                            </div>
                        ) : (
                            <>
                                <section className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-lg">
                                    <div className="bg-slate-800/50 p-4 border-b border-slate-800 flex flex-col gap-1">
                                        <div className="flex items-center gap-2">
                                            <IconZap className="w-5 h-5 text-yellow-500" />
                                            <h3 className="font-bold tracking-wide">Potencia (Tren Inferior)</h3>
                                        </div>
                                        <span className="text-xs text-slate-400">{latestEval.date || 'Sin fecha'}</span>
                                    </div>
                                    <div className="p-4">
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-800/50">
                                                <span className="text-[11px] text-slate-400 block mb-1 font-medium truncate">CMJ</span>
                                                <div className="flex items-baseline gap-2">
                                                    <span className="text-xl font-bold text-white">{getMetric('power', 'cmj').current || '-'}</span>
                                                    <TrendBadge current={getMetric('power', 'cmj').current} previous={getMetric('power', 'cmj').previous} />
                                                </div>
                                            </div>
                                            <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-800/50">
                                                <span className="text-[11px] text-slate-400 block mb-1 font-medium truncate">Abalakov</span>
                                                <div className="flex items-baseline gap-2">
                                                    <span className="text-xl font-bold text-white">{getMetric('power', 'abalakov').current || '-'}</span>
                                                    <TrendBadge current={getMetric('power', 'abalakov').current} previous={getMetric('power', 'abalakov').previous} />
                                                </div>
                                            </div>
                                            <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-800/50 col-span-2 sm:col-span-1">
                                                <span className="text-[11px] text-slate-400 block mb-1 font-medium truncate">Salto Horiz.</span>
                                                <div className="flex items-baseline gap-2">
                                                    <span className="text-xl font-bold text-white">{getMetric('power', 'broadJump').current || '-'}</span>
                                                    <TrendBadge current={getMetric('power', 'broadJump').current} previous={getMetric('power', 'broadJump').previous} />
                                                </div>
                                            </div>
                                            <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-800/50 col-span-2 sm:col-span-1 flex flex-col justify-between">
                                                <div className="flex justify-between items-center mb-1">
                                                    <span className="text-[11px] text-slate-400 font-medium truncate">Drop Jump</span>
                                                    <span className="text-[10px] text-orange-400 font-bold bg-orange-500/10 px-1 rounded">RSI: {getMetric('power', 'dropJump', 'rsi').current || '-'}</span>
                                                </div>
                                                <div className="flex items-baseline gap-2">
                                                    <span className="text-xl font-bold text-white">{getMetric('power', 'dropJump', 'height').current || '-'}</span>
                                                    <TrendBadge current={getMetric('power', 'dropJump', 'height').current} previous={getMetric('power', 'dropJump', 'height').previous} />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                <section className="bg-gradient-to-br from-orange-950/40 to-slate-900 border border-orange-900/30 rounded-xl overflow-hidden relative shadow-lg">
                                    <div className="absolute top-0 right-0 p-4 opacity-5">
                                        <IconTarget className="w-32 h-32" />
                                    </div>
                                    <div className="p-4 border-b border-orange-900/20 relative z-10 flex flex-col gap-1">
                                        <h3 className="font-bold tracking-wide text-orange-400">Rendimiento Específico (Tatami)</h3>
                                        <span className="text-xs text-slate-400">{latestEval.date || 'Sin fecha'}</span>
                                    </div>
                                    <div className="p-4 grid grid-cols-2 gap-4 relative z-10">
                                        <div className="bg-slate-900/60 backdrop-blur rounded-lg p-3 border border-slate-800 shadow-inner">
                                            <span className="text-xs text-slate-300 block mb-1 font-medium">Agarre (Grip)</span>
                                            <div className="flex items-baseline gap-2">
                                                <span className="text-xl font-bold text-white">{getMetric('grappling', 'gripStrength').current || '-'}</span>
                                                <TrendBadge current={getMetric('grappling', 'gripStrength').current} previous={getMetric('grappling', 'gripStrength').previous} />
                                            </div>
                                        </div>
                                        <div className="bg-slate-900/60 backdrop-blur rounded-lg p-3 border border-slate-800 shadow-inner">
                                            <span className="text-xs text-slate-300 block mb-1 font-medium">Reps Kimono</span>
                                            <div className="flex items-baseline gap-2">
                                                <span className="text-xl font-bold text-white">{getMetric('grappling', 'kimonoReps').current || '-'}</span>
                                                <TrendBadge current={getMetric('grappling', 'kimonoReps').current} previous={getMetric('grappling', 'kimonoReps').previous} />
                                            </div>
                                        </div>
                                        <div className="bg-slate-900/60 backdrop-blur rounded-lg p-3 border border-slate-800 shadow-inner col-span-2">
                                            <span className="text-xs text-slate-300 block mb-1 font-medium">Tiempo con gi (s)</span>
                                            <div className="flex items-baseline gap-2">
                                                <span className="text-xl font-bold text-white">{getMetric('grappling', 'kimonoTime').current || '-'}</span>
                                                <TrendBadge current={getMetric('grappling', 'kimonoTime').current} previous={getMetric('grappling', 'kimonoTime').previous} />
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                <section className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-lg">
                                    <div className="bg-slate-800/50 p-4 border-b border-slate-800 flex flex-col gap-1">
                                        <h3 className="font-bold tracking-wide">Fuerza Máxima (RM Indirecto)</h3>
                                        <span className="text-xs text-slate-400">{latestEval.date || 'Sin fecha'}</span>
                                    </div>
                                    <div className="divide-y divide-slate-800">
                                        <div className="flex justify-between items-center p-4 hover:bg-slate-800/30 transition-colors">
                                            <span className="text-slate-300 font-medium">Back Squat</span>
                                            <div className="flex items-center gap-3">
                                                <span className="font-bold text-lg">{getMetric('strength', 'squat').current || '-'}</span>
                                                <TrendBadge current={getMetric('strength', 'squat').current} previous={getMetric('strength', 'squat').previous} />
                                            </div>
                                        </div>
                                        <div className="flex justify-between items-center p-4 hover:bg-slate-800/30 transition-colors">
                                            <span className="text-slate-300 font-medium">Bench Press</span>
                                            <div className="flex items-center gap-3">
                                                <span className="font-bold text-lg">{getMetric('strength', 'bench').current || '-'}</span>
                                                <TrendBadge current={getMetric('strength', 'bench').current} previous={getMetric('strength', 'bench').previous} />
                                            </div>
                                        </div>
                                        <div className="flex justify-between items-center p-4 hover:bg-slate-800/30 transition-colors">
                                            <span className="text-slate-300 font-medium">Deadlift</span>
                                            <div className="flex items-center gap-3">
                                                <span className="font-bold text-lg">{getMetric('strength', 'deadlift').current || '-'}</span>
                                                <TrendBadge current={getMetric('strength', 'deadlift').current} previous={getMetric('strength', 'deadlift').previous} />
                                            </div>
                                        </div>
                                        <div className="flex justify-between items-center p-4 hover:bg-slate-800/30 transition-colors">
                                            <div className="flex flex-col">
                                                <span className="text-slate-300 font-medium">Dominadas Lastradas</span>
                                                <span className="text-[10px] text-orange-400 font-semibold tracking-wide uppercase mt-0.5">{getMetric('strength', 'pullups', 'reps').current || '0'} Repeticiones</span>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <span className="font-bold text-lg">{getMetric('strength', 'pullups', 'weight').current || '-'}</span>
                                                <TrendBadge current={getMetric('strength', 'pullups', 'weight').current} previous={getMetric('strength', 'pullups', 'weight').previous} />
                                            </div>
                                        </div>
                                    </div>
                                </section>
                            </>
                        )}
                    </main>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [athleteData, setAthleteData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (currentUser) => {
                    if (currentUser) {
                        setUser(currentUser);
                        try {
                            const docRef = db.collection("athletes").doc(currentUser.email);
                            const docSnap = await docRef.get();
                            if (docSnap.exists) {
                                setAthleteData(docSnap.data());
                            } else {
                                setAthleteData(null);
                            }
                        } catch (error) {
                            console.error("Error al obtener datos:", error);
                        }
                    } else {
                        setUser(null);
                        setAthleteData(null);
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            if (loading) {
                return (
                    <div className="min-h-screen bg-slate-950 flex flex-col justify-center items-center text-white">
                        <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-orange-500 mb-4"></div>
                        <p className="text-slate-400 text-sm tracking-widest uppercase font-semibold">Cargando...</p>
                    </div>
                );
            }

            return (
                <React.Fragment>
                    {!user ? (
                        <LoginView />
                    ) : athleteData ? (
                        <DashboardView
                            data={athleteData}
                            onLogout={() => auth.signOut()}
                        />
                    ) : (
                        <div className="min-h-screen bg-slate-950 flex flex-col justify-center items-center p-4">
                            <div className="bg-slate-900 border border-slate-800 rounded-xl p-6 text-center text-white max-w-sm">
                                <IconLock className="w-12 h-12 text-orange-500 mx-auto mb-4 opacity-50" />
                                <h2 className="text-xl font-bold text-orange-500 mb-2">Cuenta Pendiente</h2>
                                <p className="text-slate-400 text-sm mb-6">Tu perfil aún no ha sido configurado en el sistema por Coach León. Regresa más tarde.</p>
                                <button
                                    onClick={() => auth.signOut()}
                                    className="bg-slate-800 hover:bg-slate-700 text-white px-6 py-2 rounded-lg text-sm font-semibold transition-colors border border-slate-700 hover:border-slate-600 w-full"
                                >
                                    Cerrar Sesión
                                </button>
                            </div>
                        </div>
                    )}
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>

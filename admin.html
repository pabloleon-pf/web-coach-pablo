        const InputField = ({ label, path, placeholder = "", formData, selectedEmail, updateField }) => {
            // Determine value securely
            const val = path.split('.').reduce((acc, part) => acc && acc[part] !== undefined ? acc[part] : '', formData);

                <div className="flex flex-col">
                    <label className="text-xs text-slate-400 mb-1 font-semibold">{label}</label>

                        type="text"
                        value={val}
                        onChange={(e) => updateField(path, e.target.value)}
                        placeholder={placeholder}
                        disabled={path === 'email' && selectedEmail !== 'NEW'}

        };
        const IconZap = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></svg>;
        const IconTarget = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></svg>;
        const IconArrowUp = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="19" x2="12" y2="5" /><polyline points="5 12 12 5 19 12" /></svg>;
        const IconArrowDown = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19" /><polyline points="19 12 12 19 5 12" /></svg>;

        const TrendBadge = ({ current, previous }) => {
            if (!current || !previous) return null;
            const currVal = parseFloat(current);
            const prevVal = parseFloat(previous);
            if (isNaN(currVal) || isNaN(prevVal)) return null;

            const diffValue = currVal - prevVal;
            if (diffValue === 0) return null;

            const isPositive = diffValue > 0;
            const diffFormatted = diffValue % 1 === 0 ? diffValue : diffValue.toFixed(1);

            return (
                <span className={`flex items-center text-xs font-semibold px-1.5 py-0.5 rounded border ${isPositive ? 'text-green-500 bg-green-500/10 border-green-500/20' : 'text-red-500 bg-red-500/10 border-red-500/20'}`}>
                    {isPositive ? <IconArrowUp className="w-3 h-3 mr-0.5" /> : <IconArrowDown className="w-3 h-3 mr-0.5" />}
                    {isPositive ? '+' : ''}{diffFormatted}
                </span>
            );
        };

        const AthleteDashboardPreview = ({ formData }) => {
            if (!formData || !formData.evaluations || formData.evaluations.length === 0) return null;

            const evals = [...formData.evaluations];
            const parseDate = (dateStr) => {
                if (!dateStr) return 0;
                const parts = dateStr.split('/');
                if (parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]).getTime();
                const parsed = Date.parse(dateStr);
                return isNaN(parsed) ? 0 : parsed;
            };
            evals.sort((a, b) => parseDate(a.date) - parseDate(b.date));

            const uniqueEvalsMap = new Map();
            evals.forEach(e => uniqueEvalsMap.set(e.date, e));
            const uniqueEvals = Array.from(uniqueEvalsMap.values());
            evals.length = 0;
            evals.push(...uniqueEvals);

            const getMetric = (category, metric, field = 'current') => {
                let currentDate = null;
                const history = [];
                for (let i = evals.length - 1; i >= 0; i--) {
                    const e = evals[i];
                    if (e[category] && e[category][metric] && e[category][metric][field] && e[category][metric][field] !== '') {
                        history.push(e[category][metric][field]);
                        if (history.length === 1) currentDate = e.date;
                        if (history.length === 2) break;
                    }
                }
                return { current: history.length > 0 ? history[0] : null, previous: history.length > 1 ? history[1] : null, date: currentDate || '-' };
            };

            return (
                <div className="space-y-6 mt-6">
                    <section className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-lg">
                        <div className="bg-slate-800/50 p-4 border-b border-slate-800 flex flex-col gap-1">

                                <h3 className="font-bold tracking-wide">Potencia (Tren Inferior)</h3>
                            </div>
                        </div>
                        <div className="p-4">

                                    <div className="flex items-baseline gap-2">
                                        <span className="text-xl font-bold text-white">{getMetric('power', 'cmj').current || '-'}</span>
                                        <TrendBadge current={getMetric('power', 'cmj').current} previous={getMetric('power', 'cmj').previous} />
                                    </div>
                                </div>
                                <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-800/50">
                                    <div className="flex justify-between items-center mb-1"><span className="text-[11px] text-slate-400 block mb-1 font-medium truncate">Abalakov</span><span className="text-[9px] text-slate-500">{getMetric('power', 'abalakov').date}</span></div>
                                    <div className="flex items-baseline gap-2">
                                        <span className="text-xl font-bold text-white">{getMetric('power', 'abalakov').current || '-'}</span>
                                        <TrendBadge current={getMetric('power', 'abalakov').current} previous={getMetric('power', 'abalakov').previous} />
                                    </div>
                                </div>
                                <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-800/50 col-span-2 sm:col-span-1">
                                    <div className="flex justify-between items-center mb-1"><span className="text-[11px] text-slate-400 block mb-1 font-medium truncate">Salto Horiz.</span><span className="text-[9px] text-slate-500">{getMetric('power', 'broadJump').date}</span></div>
                                    <div className="flex items-baseline gap-2">
                                        <span className="text-xl font-bold text-white">{getMetric('power', 'broadJump').current || '-'}</span>
                                        <TrendBadge current={getMetric('power', 'broadJump').current} previous={getMetric('power', 'broadJump').previous} />
                                    </div>
                                </div>
                                <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-800/50 col-span-2 sm:col-span-1 flex flex-col justify-between">
                                    <div className="flex justify-between items-center mb-1">
                                        <div className="flex items-center gap-2"><span className="text-[11px] text-slate-400 font-medium truncate">Drop Jump</span><span className="text-[9px] text-slate-500">{getMetric('power', 'dropJump', 'height').date}</span></div>
                                        <span className="text-[10px] text-orange-400 font-bold bg-orange-500/10 px-1 rounded">RSI: {getMetric('power', 'dropJump', 'rsi').current || '-'}</span>
                                    </div>
                                    <div className="flex items-baseline gap-2">
                                        <span className="text-xl font-bold text-white">{getMetric('power', 'dropJump', 'height').current || '-'}</span>
                                        <TrendBadge current={getMetric('power', 'dropJump', 'height').current} previous={getMetric('power', 'dropJump', 'height').previous} />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                    <section className="bg-gradient-to-br from-orange-950/40 to-slate-900 border border-orange-900/30 rounded-xl overflow-hidden relative shadow-lg">
                        <div className="absolute top-0 right-0 p-4 opacity-5">
                            <IconTarget className="w-32 h-32" />
                        </div>
                        <div className="p-4 border-b border-orange-900/20 relative z-10 flex flex-col gap-1">
                            <h3 className="font-bold tracking-wide text-orange-400">Rendimiento Específico (Tatami)</h3>
                        </div>
                        <div className="p-4 grid grid-cols-2 gap-4 relative z-10">
                            <div className="bg-slate-900/60 backdrop-blur rounded-lg p-3 border border-slate-800 shadow-inner">
                                <div className="flex justify-between items-center mb-1"><span className="text-xs text-slate-300 block mb-1 font-medium">Grip (Der)</span><span className="text-[9px] text-slate-500">{getMetric('grappling', 'gripStrengthRight').date}</span></div>
                                <div className="flex items-baseline gap-2">
                                    <span className="text-xl font-bold text-white">{getMetric('grappling', 'gripStrengthRight').current || '-'}</span>
                                    <TrendBadge current={getMetric('grappling', 'gripStrengthRight').current} previous={getMetric('grappling', 'gripStrengthRight').previous} />
                                </div>
                            </div>
                            <div className="bg-slate-900/60 backdrop-blur rounded-lg p-3 border border-slate-800 shadow-inner">
                                <div className="flex justify-between items-center mb-1"><span className="text-xs text-slate-300 block mb-1 font-medium">Grip (Izq)</span><span className="text-[9px] text-slate-500">{getMetric('grappling', 'gripStrengthLeft').date}</span></div>
                                <div className="flex items-baseline gap-2">
                                    <span className="text-xl font-bold text-white">{getMetric('grappling', 'gripStrengthLeft').current || '-'}</span>
                                    <TrendBadge current={getMetric('grappling', 'gripStrengthLeft').current} previous={getMetric('grappling', 'gripStrengthLeft').previous} />
                                </div>
                            </div>
                            <div className="bg-slate-900/60 backdrop-blur rounded-lg p-3 border border-slate-800 shadow-inner">
                                <div className="flex justify-between items-center mb-1"><span className="text-xs text-slate-300 block mb-1 font-medium">Reps Kimono</span><span className="text-[9px] text-slate-500">{getMetric('grappling', 'kimonoReps').date}</span></div>
                                <div className="flex items-baseline gap-2">
                                    <span className="text-xl font-bold text-white">{getMetric('grappling', 'kimonoReps').current || '-'}</span>
                                    <TrendBadge current={getMetric('grappling', 'kimonoReps').current} previous={getMetric('grappling', 'kimonoReps').previous} />
                                </div>
                            </div>
                            <div className="bg-slate-900/60 backdrop-blur rounded-lg p-3 border border-slate-800 shadow-inner col-span-2">
                                <div className="flex justify-between items-center mb-1"><span className="text-xs text-slate-300 block mb-1 font-medium">Tiempo con gi (s)</span><span className="text-[9px] text-slate-500">{getMetric('grappling', 'kimonoTime').date}</span></div>
                                <div className="flex items-baseline gap-2">
                                    <span className="text-xl font-bold text-white">{getMetric('grappling', 'kimonoTime').current || '-'}</span>
                                    <TrendBadge current={getMetric('grappling', 'kimonoTime').current} previous={getMetric('grappling', 'kimonoTime').previous} />
                                </div>
                            </div>
                        </div>
                    </section>
                    <section className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-lg">
                        <div className="bg-slate-800/50 p-4 border-b border-slate-800 flex flex-col gap-1">
                            <h3 className="font-bold tracking-wide">Fuerza Máxima (RM Indirecto)</h3>
                        </div>
                        <div className="divide-y divide-slate-800">
                            <div className="flex justify-between items-center p-4 hover:bg-slate-800/30 transition-colors">
                                <div className="flex flex-col"><span className="text-slate-300 font-medium">Back Squat</span><span className="text-[10px] text-slate-500">{getMetric('strength', 'squat').date}</span></div>
                                <div className="flex items-center gap-3">
                                    <span className="font-bold text-lg">{getMetric('strength', 'squat').current || '-'}</span>
                                    <TrendBadge current={getMetric('strength', 'squat').current} previous={getMetric('strength', 'squat').previous} />
                                </div>
                            </div>
                            <div className="flex justify-between items-center p-4 hover:bg-slate-800/30 transition-colors">
                                <div className="flex flex-col"><span className="text-slate-300 font-medium">Bench Press</span><span className="text-[10px] text-slate-500">{getMetric('strength', 'bench').date}</span></div>
                                <div className="flex items-center gap-3">
                                    <span className="font-bold text-lg">{getMetric('strength', 'bench').current || '-'}</span>
                                    <TrendBadge current={getMetric('strength', 'bench').current} previous={getMetric('strength', 'bench').previous} />
                                </div>
                            </div>
                            <div className="flex justify-between items-center p-4 hover:bg-slate-800/30 transition-colors">
                                <div className="flex flex-col"><span className="text-slate-300 font-medium">Deadlift</span><span className="text-[10px] text-slate-500">{getMetric('strength', 'deadlift').date}</span></div>
                                <div className="flex items-center gap-3">
                                    <span className="font-bold text-lg">{getMetric('strength', 'deadlift').current || '-'}</span>
                                    <TrendBadge current={getMetric('strength', 'deadlift').current} previous={getMetric('strength', 'deadlift').previous} />
                                </div>
                            </div>
                            <div className="flex justify-between items-center p-4 hover:bg-slate-800/30 transition-colors">
                                <div className="flex flex-col">
                                    <div className="flex flex-col"><span className="text-slate-300 font-medium">Dominadas Lastradas</span><span className="text-[10px] text-slate-500">{getMetric('strength', 'pullups', 'weight').date}</span></div>
                                    <span className="text-[10px] text-orange-400 font-semibold tracking-wide uppercase mt-0.5">{getMetric('strength', 'pullups', 'reps').current || '0'} Repeticiones</span>
                                </div>
                                <div className="flex items-center gap-3">
                                    <span className="font-bold text-lg">{getMetric('strength', 'pullups', 'weight').current || '-'}</span>
                                    <TrendBadge current={getMetric('strength', 'pullups', 'weight').current} previous={getMetric('strength', 'pullups', 'weight').previous} />
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        const AdminDashboard = ({ user, onLogout }) => {
            const [athletes, setAthletes] = useState([]);
            const [selectedEmail, setSelectedEmail] = useState(null);

            const [importing, setImporting] = useState(false);
            const fileInputRef = React.useRef(null);

            // Initial empty structure to prevent errors
            const emptyEvaluation = {
                date: '',
                power: {
                    cmj: { current: '' },
                    abalakov: { current: '' },
                    broadJump: { current: '' },
                    dropJump: { height: '', rsi: '' }
                },
                grappling: {
                    gripStrengthRight: { current: '' },
                    gripStrengthLeft: { current: '' },
                    kimonoReps: { current: '' },
                    kimonoTime: { current: '' }
                },
                strength: {
                    squat: { current: '' },
                    bench: { current: '' },
                    deadlift: { current: '' },
                    pullups: { weight: '', reps: '' }
                }
            };

            const emptyAthlete = {
                name: '',
                status: 'Activo',
                email: '',
                profileImg: '',
                summary: { bodyWeight: '', relativeStrength: '', nextGoal: '' },
                evaluations: []
            };

            const [formData, setFormData] = useState(emptyAthlete);
            const [saving, setSaving] = useState(false);
            const [msg, setMsg] = useState('');

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (event) => {
                    setImporting(true);
                    setMsg('Procesando archivo CSV...');
                    try {
                        const text = event.target.result;
                        await processCSV(text);
                    } catch (err) {
                        setMsg(`Error al procesar CSV: ${err.message}`);
                    }
                    setImporting(false);
                    if (fileInputRef.current) fileInputRef.current.value = ""; // Reset input
                };
                reader.readAsText(file);
            };

            const processCSV = async (csvText) => {
                const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== '');
                if (lines.length < 2) throw new Error("El archivo está vacío o no tiene datos suficientes.");

                const parseCSVLine = (text, sep) => {
                    const result = [];
                    let curVal = '';
                    let inQuotes = false;
                    for (let i = 0; i < text.length; i++) {
                        const char = text[i];
                        if (inQuotes) {
                            if (char === '"' && i + 1 < text.length && text[i + 1] === '"') {
                                curVal += '"'; i++;
                            } else if (char === '"') {
                                inQuotes = false;
                            } else {
                                curVal += char;
                            }
                        } else {
                            if (char === '"') {
                                inQuotes = true;
                            } else if (char === sep) {
                                result.push(curVal); curVal = '';
                            } else {
                                curVal += char;
                            }
                        }
                    }
                    result.push(curVal);
                    return result;
                };

                const separator = lines[0].includes(';') ? ';' : ',';
                const headers = parseCSVLine(lines[0], separator).map(h => h.trim().toLowerCase());

                const getCol = (row, potentialNames) => {
                    let val = '';
                    for (let name of potentialNames) { // Exact match first
                        const idx = headers.findIndex(h => h === name);
                        if (idx !== -1 && row[idx] !== undefined && row[idx] !== null) { val = row[idx].trim(); break; }
                    }
                    if (!val) {
                        for (let name of potentialNames) { // Includes match secondary
                            const idx = headers.findIndex(h => h.includes(name));
                            if (idx !== -1 && row[idx] !== undefined && row[idx] !== null) { val = row[idx].trim(); break; }
                        }
                    }
                    // Fix Spanish decimals: "45,5" -> "45.5"
                    if (/^-?\d+,\d+$/.test(val)) val = val.replace(',', '.');
                    return val;
                };

                const batch = db.batch();
                let count = 0;
                const athletesCache = {}; // Cache to prevent overwriting when multiple rows exist for the same athlete

                for (let i = 1; i < lines.length; i++) {
                    const row = parseCSVLine(lines[i], separator);
                    if (row.length < 2) continue;

                    const email = getCol(row, ['correo', 'email', 'mail']);
                    if (!email) continue;
                    const emailKey = email.toLowerCase();

                    let name = getCol(row, ['nombre', 'name', 'atleta']);
                    if (!name && headers[0] === '') {
                        name = row[0].trim().replace(/"/g, ''); // Fix for CSVs missing the 'Nombre' header
                    }

                    const status = getCol(row, ['estado', 'status']) || 'Activo';
                    const weight = getCol(row, ['peso', 'weight']);
                    const date = getCol(row, ['fecha', 'date']) || new Date().toLocaleDateString('es-CL');

                    const cmj = getCol(row, ['cmj']);
                    const abalakov = getCol(row, ['abalakov']);
                    const broadJump = getCol(row, ['salto horizontal', 'horizontal']);
                    const rsi = getCol(row, ['rsi']);

                    const squat = getCol(row, ['squat', 'sentadilla', 'back squat']);
                    const bench = getCol(row, ['bench', 'pecho', 'bench press']);
                    const deadlift = getCol(row, ['deadlift', 'peso muerto']);
                    const pullups = getCol(row, ['dominadas', 'pull-up', 'pullup']);

                    // Match specific variants with parentheses to prevent failure on "Handgrip (D)"
                    const gripRight = getCol(row, ['handgrip derecha', 'handgrip (d)', 'grip (d)', 'handgrip d', 'grip d', 'derecha', 'handgrip']); // Added fallback to handgrip if only 1 exists
                    const gripLeft = getCol(row, ['handgrip izquierda', 'handgrip (i)', 'grip (i)', 'handgrip i', 'grip i', 'izquierda']);

                    const kimono = getCol(row, ['rept con gi', 'kimono']);
                    const kimonoTime = getCol(row, ['tiempo con gi', 'tiempo']);

                    const athleteRef = db.collection('athletes').doc(emailKey);

                    // Fetch existing to append evaluation (use cache if available)
                    let athleteData;
                    if (athletesCache[emailKey]) {
                        athleteData = athletesCache[emailKey];
                    } else {
                        const docSnap = await athleteRef.get();
                        if (docSnap.exists) {
                            athleteData = docSnap.data();
                            // Safely copy evaluations to prevent Firebase array mutation bugs
                            athleteData.evaluations = athleteData.evaluations ? JSON.parse(JSON.stringify(athleteData.evaluations)) : [];
                        } else {
                            athleteData = { ...JSON.parse(JSON.stringify(emptyAthlete)), email: emailKey, name, status };
                        }
                        athletesCache[emailKey] = athleteData;
                    }

                    if (name && !athleteData.name) athleteData.name = name;

                    const isValidVal = (val) => val && val.trim() !== '' && val.trim() !== '0' && val.trim() !== '0.0';

                    if (isValidVal(weight)) {
                        if (!athleteData.summary) athleteData.summary = { ...emptyAthlete.summary };
                        athleteData.summary.bodyWeight = weight;
                    }

                    const newEval = JSON.parse(JSON.stringify(emptyEvaluation));
                    newEval.date = date;

                    let hasNewData = false;
                    if (date) {

                        if (isValidVal(cmj)) { newEval.power.cmj.current = cmj; hasNewData = true; }
                        if (isValidVal(abalakov)) { newEval.power.abalakov.current = abalakov; hasNewData = true; }
                        if (isValidVal(broadJump)) { newEval.power.broadJump.current = broadJump; hasNewData = true; }
                        if (isValidVal(rsi)) { newEval.power.dropJump.rsi = rsi; hasNewData = true; }

                        if (isValidVal(squat)) { newEval.strength.squat.current = squat; hasNewData = true; }
                        if (isValidVal(bench)) { newEval.strength.bench.current = bench; hasNewData = true; }
                        if (isValidVal(deadlift)) { newEval.strength.deadlift.current = deadlift; hasNewData = true; }
                        if (isValidVal(pullups)) { newEval.strength.pullups.weight = pullups; hasNewData = true; }

                        if (isValidVal(gripRight)) { newEval.grappling.gripStrengthRight.current = gripRight; hasNewData = true; }
                        if (isValidVal(gripLeft)) { newEval.grappling.gripStrengthLeft.current = gripLeft; hasNewData = true; }
                        if (isValidVal(kimono)) { newEval.grappling.kimonoReps.current = kimono; hasNewData = true; }
                        if (isValidVal(kimonoTime)) { newEval.grappling.kimonoTime = { current: kimonoTime }; hasNewData = true; }

                        if (hasNewData) {
                            if (!athleteData.evaluations) athleteData.evaluations = [];

                            // Prevent duplicates by checking if an evaluation for this EXACT date already exists in the cache
                            const existingEvalIndex = athleteData.evaluations.findIndex(e => e.date === date);
                            if (existingEvalIndex >= 0) {
                                // Merge new data into the existing evaluation for this date to avoid duplicates
                                const existing = athleteData.evaluations[existingEvalIndex];

                                // Helper to safely set nested properties to avoid "Cannot set properties of undefined"
                                const safeSet = (obj, category, metric, field, val) => {
                                    if (!obj[category]) obj[category] = {};
                                    if (!obj[category][metric]) obj[category][metric] = {};
                                    obj[category][metric][field] = val;
                                };

                                if (isValidVal(cmj)) safeSet(existing, 'power', 'cmj', 'current', cmj);
                                if (isValidVal(abalakov)) safeSet(existing, 'power', 'abalakov', 'current', abalakov);
                                if (isValidVal(broadJump)) safeSet(existing, 'power', 'broadJump', 'current', broadJump);
                                if (isValidVal(rsi)) safeSet(existing, 'power', 'dropJump', 'rsi', rsi);

                                if (isValidVal(squat)) safeSet(existing, 'strength', 'squat', 'current', squat);
                                if (isValidVal(bench)) safeSet(existing, 'strength', 'bench', 'current', bench);
                                if (isValidVal(deadlift)) safeSet(existing, 'strength', 'deadlift', 'current', deadlift);
                                if (isValidVal(pullups)) safeSet(existing, 'strength', 'pullups', 'weight', pullups);

                                if (isValidVal(gripRight)) safeSet(existing, 'grappling', 'gripStrengthRight', 'current', gripRight);
                                if (isValidVal(gripLeft)) safeSet(existing, 'grappling', 'gripStrengthLeft', 'current', gripLeft);
                                if (isValidVal(kimono)) safeSet(existing, 'grappling', 'kimonoReps', 'current', kimono);
                                if (isValidVal(kimonoTime)) safeSet(existing, 'grappling', 'kimonoTime', 'current', kimonoTime);

                            } else {
                                athleteData.evaluations.push(newEval);
                            }
                        }
                    }

                    count++;
                }

                // Helper to parse dates like DD/MM/YYYY into a comparable number
                const parseDate = (dateStr) => {
                    if (!dateStr) return 0;
                    const parts = dateStr.split('/');
                    if (parts.length === 3) {
                        return new Date(parts[2], parts[1] - 1, parts[0]).getTime();
                    }
                    const parsed = Date.parse(dateStr);
                    return isNaN(parsed) ? 0 : parsed;
                };

                // Add to batch and sort history chronologically
                for (const emailKey in athletesCache) {
                    const athleteData = athletesCache[emailKey];
                    if (athleteData.evaluations && athleteData.evaluations.length > 0) {
                        athleteData.evaluations.sort((a, b) => parseDate(a.date) - parseDate(b.date));
                    }
                    const athleteRef = db.collection('athletes').doc(emailKey);
                    batch.set(athleteRef, athleteData, { merge: true });
                }

                if (count > 0) {
                    await batch.commit();
                    setMsg(`¡Importación exitosa! Se procesaron ${count} atletas.`);
                } else {
                    setMsg("No se encontraron atletas válidos. (Revisa que la columna 'email' o 'correo' exista).");
                }
            };

            // Helper to add a new evaluation
            const handleAddEvaluation = () => {
                const today = new Date();
                const dateString = `${today.getDate()} ${today.toLocaleString('es-ES', { month: 'short' })}`;

                setFormData(prev => ({
                    ...prev,
                    evaluations: [...(prev.evaluations || []), { ...emptyEvaluation, date: dateString }]
                }));
            };

            // Helper to duplicate last evaluation (to use as baseline)
            const handleDuplicateLastEvaluation = () => {
                if (!formData.evaluations || formData.evaluations.length === 0) return handleAddEvaluation();

                const lastEval = JSON.parse(JSON.stringify(formData.evaluations[formData.evaluations.length - 1])); // deep clone
                const today = new Date();
                lastEval.date = `${today.getDate()} ${today.toLocaleString('es-ES', { month: 'short' })}`; // Update date

                setFormData(prev => ({
                    ...prev,
                    evaluations: [...prev.evaluations, lastEval]

            const [editingId, setEditingId] = useState(null);

            const obtenerSemanaDelAno = (fecha) => {
                const d = new Date(Date.UTC(fecha.getFullYear(), fecha.getMonth(), fecha.getDate()));
                const numDia = d.getUTCDay() || 7;
                d.setUTCDate(d.getUTCDate() + 4 - numDia);
                const inicioAno = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
                return Math.ceil((((d - inicioAno) / 86400000) + 1) / 7);
            };

            const handleAddRecord = async (e) => {
                e.preventDefault();
                if (!newFecha || !newRpe || !newDuracion) return alert('Completa todos los campos');
                setSaving(true);
                try {
                    const fechaObj = new Date(newFecha + 'T12:00:00Z');
                    const semana = obtenerSemanaDelAno(fechaObj);
                    const anio = fechaObj.getFullYear();
                    const rpeVal = parseInt(newRpe, 10);
                    const durVal = parseInt(newDuracion, 10);
                    const srpeVal = rpeVal * durVal;

                    const normalizedEmail = email.trim().toLowerCase();

                    await db.collection('athletes').doc(normalizedEmail)
                        .collection('monitoreo_diario').add({
                            fecha_sesion: newFecha,
                            rpe: rpeVal,
                            duracion: durVal,
                            srpe: srpeVal,
                            semana_del_ano: semana,
                            anio: anio,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });

                    setNewFecha('');
                    setNewRpe('');
                    setNewDuracion('60');
                } catch (err) {
                    console.error('Error al guardar:', err);
                    alert('Error al guardar el registro');
                }
                setSaving(false);
            };

            // Fetch data
            useEffect(() => {
                if (!email) return;
                const normalizedEmail = email.trim().toLowerCase();
                const unsubscribe = db.collection('athletes')
                    .doc(normalizedEmail)
                    .collection('monitoreo_diario')
                    .orderBy('fecha_sesion', 'asc')
                    .onSnapshot(snapshot => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setLogs(data);
                        setLoading(false);
                    }, err => {
                        console.error("Error al cargar sRPE:", err);
                        setLoading(false);
                    });
                return () => unsubscribe();
            }, [email]);

            const handleDelete = async (id) => {
                if (window.confirm("¿Estás seguro de que deseas eliminar este registro sRPE?")) {
                    setDeletingId(id);
                    try {
                        const normalizedEmail = email.trim().toLowerCase();
                        await db.collection('athletes').doc(normalizedEmail).collection('monitoreo_diario').doc(id).delete();
                    } catch (err) {
                        console.error("Error al eliminar:", err);
                        alert("Hubo un error al eliminar el registro.");
                    }
                    setDeletingId(null);
                }
            };

            const startEdit = (log) => {
                setEditingId(log.id);
                setEditRpe(log.rpe);
                setEditDuracion(log.duracion);
            };

            const saveEdit = async (log) => {
                try {
                    const normalizedEmail = email.trim().toLowerCase();
                    const newSrpe = parseInt(editRpe, 10) * parseInt(editDuracion, 10);
                    await db.collection('athletes').doc(normalizedEmail).collection('monitoreo_diario').doc(log.id).update({
                        rpe: editRpe,
                        duracion: editDuracion,
                        srpe: newSrpe
                    });
                    setEditingId(null);
                } catch (err) {
                    console.error("Error al actualizar:", err);
                    alert("Hubo un error al actualizar el registro.");
                }
            };

            // Calculate weekly data
            const weeklyData = logs.reduce((acc, log) => {
                const weekStr = `Semana ${log.semana_del_ano}`;
                if (!acc[weekStr]) {
                    acc[weekStr] = { sumSrpe: 0, sumRpe: 0, count: 0, weekStr };
                }
                const currentSrpe = parseInt(log.srpe, 10);
                const currentRpe = parseInt(log.rpe, 10);

                if (!isNaN(currentSrpe)) acc[weekStr].sumSrpe += currentSrpe;
                if (!isNaN(currentRpe)) {
                    acc[weekStr].sumRpe += currentRpe;
                    acc[weekStr].count += 1;
                }
                return acc;
            }, {});

            const chartData = Object.values(weeklyData).map(d => ({
                ...d,
                avgRpe: d.count > 0 ? (d.sumRpe / d.count).toFixed(1) : 0
            }));

            // Max values for chart scaling
            const maxVolume = Math.max(1000, ...chartData.map(d => d.sumSrpe)); // Min 1000 threshold
            const maxRpe = 10;

            if (loading) return <div className="p-4 text-center text-slate-500 animate-pulse">Cargando módulo sRPE...</div>;

            return (
                <div className="space-y-6">
                    {/* Formulario de Ingreso Manual Admin */}
                    <div className="bg-slate-800/50 p-6 rounded-xl border border-slate-700">
                        <h4 className="text-sm font-bold text-slate-300 mb-4 flex items-center gap-2">
                            <i className="fas fa-plus-circle text-orange-500"></i>
                            Añadir Registro Manual (Historial)
                        </h4>
                        <form onSubmit={handleAddRecord} className="flex flex-col md:flex-row gap-4 items-end">
                            <div className="flex-1 w-full relative">
                                <label className="block text-xs text-slate-400 mb-1 ml-1 font-semibold uppercase tracking-wider">Fecha de Sesión</label>
                                <input type="date" value={newFecha} onChange={e => setNewFecha(e.target.value)} required className="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none transition-all" />
                            </div>
                            <div className="flex-1 w-full relative">
                                <label className="block text-xs text-slate-400 mb-1 ml-1 font-semibold uppercase tracking-wider">RPE (1-10)</label>
                                <input type="number" min="1" max="10" value={newRpe} onChange={e => setNewRpe(e.target.value)} required placeholder="Ej: 7" className="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none transition-all" />
                            </div>
                            <div className="flex-1 w-full relative">
                                <label className="block text-xs text-slate-400 mb-1 ml-1 font-semibold uppercase tracking-wider">Duración (Minutos)</label>
                                <select value={newDuracion} onChange={e => setNewDuracion(e.target.value)} required className="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none transition-all appearance-none cursor-pointer">
                                    <option value="30">30 min</option>
                                    <option value="60">60 min</option>
                                    <option value="90">90 min</option>
                                    <option value="120">120 min</option>
                                    <option value="150">150 min</option>
                                    <option value="180">180 min</option>
                                </select>
                            </div>
                            <button type="submit" disabled={saving} className="w-full md:w-auto bg-orange-600 hover:bg-orange-500 text-white font-bold py-2 px-6 rounded-lg transition-colors disabled:opacity-50 h-[42px] flex items-center justify-center min-w-[120px]">
                                {saving ? <i className="fas fa-spinner fa-spin"></i> : 'Guardar'}
                            </button>
                        </form>
                    </div>

                    {/* Mixed Chart */}
                    <div className="bg-slate-800/50 p-6 rounded-xl border border-slate-700">
                        <h4 className="text-sm font-bold text-slate-300 mb-6 flex items-center gap-2">
                            <span className="w-2 h-2 rounded-full bg-orange-500"></span>
                            Gráfico Mixto: Volumen (Suma sRPE) vs Intensidad (Promedio RPE)
                        </h4>

                        {chartData.length === 0 ? (
                            <p className="text-slate-500 text-sm text-center py-10 border border-dashed border-slate-700 rounded-lg bg-slate-800/20">No hay datos suficientes para graficar.</p>
                        ) : (
                            <div className="relative h-64 mt-8 flex items-end gap-4">
                                {/* Y-axis Labels */}
                                <div className="absolute left-0 top-0 bottom-6 flex flex-col justify-between text-[10px] text-slate-500 pr-2 border-r border-slate-700/50 w-8">
                                    <span>{maxVolume}</span>
                                    <span>{Math.round(maxVolume / 2)}</span>
                                    <span>0</span>
                                </div>
                                <div className="absolute right-0 top-0 bottom-6 flex flex-col justify-between text-[10px] text-blue-400 pl-2 border-l border-slate-700/50 text-right w-6">
                                    <span>10</span>
                                    <span>5</span>
                                    <span>0</span>
                                </div>

                                {/* Bars and Area */}
                                <div className="flex-1 flex items-end justify-around h-full ml-10 mr-8 relative pt-4 pb-6 border-b border-slate-700/50 pb-1">
                                    {/* SVG Line Overlay for RPE */}
                                    <svg className="absolute inset-0 w-full h-full pb-6 z-10 pointer-events-none" preserveAspectRatio="none">
                                        <polyline
                                            fill="none"
                                            stroke="#3b82f6"
                                            strokeWidth="3"
                                            strokeLinejoin="round"
                                            points={chartData.map((d, i) => {
                                                const xPos = `${(i + 0.5) * (100 / chartData.length)}%`;
                                                const yPos = `calc(100% - ${(d.avgRpe / maxRpe) * 100}%)`;
                                                // Quick hack: we can't easily use calc in points without a real DOM parser, so we compute raw pixel/percentages
                                                return `${(i + 0.5) * (100 / chartData.length)},${100 - ((d.avgRpe / maxRpe) * 100)}`;
                                            }).join(' ')}
                                            vectorEffect="non-scaling-stroke"
                                        />
                                        {chartData.map((d, i) => (
                                            <circle
                                                key={i}
                                                cx={`${(i + 0.5) * (100 / chartData.length)}%`}
                                                cy={`${100 - ((d.avgRpe / maxRpe) * 100)}%`}
                                                r="4"
                                                fill="#1e3a8a"
                                                stroke="#3b82f6"
                                                strokeWidth="2"
                                            />
                                        ))}
                                    </svg>

                                    {/* Bar Chart for Volume */}
                                    {chartData.map((d, i) => {
                                        const heightPercent = (d.sumSrpe / maxVolume) * 100;
                                        return (
                                            <div key={i} className="relative flex flex-col justify-end items-center flex-1 h-full max-w-[40px] z-0 group">
                                                <div
                                                    className="w-full bg-orange-600/80 rounded-t-sm group-hover:bg-orange-500 transition-colors"
                                                    style={{ height: `${heightPercent}%` }}
                                                ></div>
                                                <div className="absolute -bottom-6 text-[10px] text-slate-400 font-mono whitespace-nowrap hidden md:block">
                                                    {d.weekStr}
                                                </div>
                                                <div className="absolute -bottom-6 text-[10px] text-slate-400 font-mono md:hidden">
                                                    W{d.weekStr.replace('Semana ', '')}
                                                </div>

                                                {/* Tooltip */}
                                                <div className="opacity-0 group-hover:opacity-100 absolute bottom-full mb-2 bg-slate-900 border border-slate-700 px-3 py-2 rounded shadow-xl text-xs whitespace-nowrap z-50 transition-opacity pointer-events-none">
                                                    <p className="font-bold text-white border-b border-slate-700 pb-1 mb-1">{d.weekStr}</p>
                                                    <p className="text-orange-400">Volumen: <span className="text-white font-mono">{d.sumSrpe}</span></p>
                                                    <p className="text-blue-400">RPE Medio: <span className="text-white font-mono">{d.avgRpe}</span></p>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                        <div className="flex justify-center items-center gap-6 mt-6">
                            <div className="flex items-center gap-2"><div className="w-3 h-3 bg-orange-600 rounded-sm"></div><span className="text-xs text-slate-400">Volumen sRPE</span></div>
                            <div className="flex items-center gap-2"><div className="w-3 h-0.5 bg-blue-500"></div><div className="w-2 h-2 rounded-full border-2 border-blue-500 bg-slate-900 -ml-2"></div><span className="text-xs text-slate-400">Intensidad RPE Medio</span></div>
                        </div>
                    </div>

                    {/* Data Table */}
                    <div className="bg-slate-950 rounded-xl border border-slate-800 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm text-left">
                                <thead className="text-xs text-slate-400 uppercase bg-slate-900/50 border-b border-slate-800 hidden md:table-header-group">
                                    <tr>
                                        <th className="px-6 py-3">Fecha</th>
                                        <th className="px-6 py-3 text-center">RPE</th>
                                        <th className="px-6 py-3 text-center">Duración</th>
                                        <th className="px-6 py-3 text-center">sRPE</th>
                                        <th className="px-6 py-3 text-center">ISO Week</th>
                                        <th className="px-6 py-3 text-right">Acción</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {logs.length === 0 ? (
                                        <tr>
                                            <td colSpan="6" className="px-6 py-8 text-center text-slate-500">No hay registros de sRPE.</td>
                                        </tr>
                                    ) : (
                                        logs.map(log => (
                                            <tr key={log.id} className="border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors flex flex-col md:table-row py-4 md:py-0">
                                                <td className="px-6 py-4 border-b md:border-b-0 border-slate-800/50">
                                                    <span className="hidden md:inline font-mono">{log.fecha_sesion}</span>
                                                    <div className="md:hidden flex justify-between font-bold text-white mb-2 pb-2 border-b border-slate-800/50">
                                                        <span>{log.fecha_sesion}</span>
                                                        <span className="text-slate-500 text-xs">Semana {log.semana_del_ano}</span>
                                                    </div>
                                                </td>
                                                {editingId === log.id ? (
                                                    <td colSpan="4" className="px-6 py-4 space-y-4 md:space-y-0 md:flex md:gap-4 md:items-center">
                                                        <div className="flex flex-col">
                                                            <label className="text-xs text-slate-500 mb-1">RPE</label>
                                                            <input type="number" min="1" max="10" value={editRpe} onChange={e => setEditRpe(e.target.value)} className="bg-slate-900 border border-slate-700 rounded px-2 py-1 w-20 text-white focus:border-orange-500 outline-none" />
                                                        </div>
                                                        <div className="flex flex-col">
                                                            <label className="text-xs text-slate-500 mb-1">Minutos</label>
                                                            <select value={editDuracion} onChange={e => setEditDuracion(e.target.value)} className="bg-slate-900 border border-slate-700 rounded px-2 py-1 w-24 text-white focus:border-orange-500 outline-none">
                                                                <option value="30">30</option>
                                                                <option value="60">60</option>
                                                                <option value="90">90</option>
                                                                <option value="120">120</option>
                                                            </select>
                                                        </div>
                                                    </td>
                                                ) : (
                                                    <>
                                                        <td className="px-6 md:py-4 text-slate-300 md:text-center flex justify-between md:table-cell py-1">
                                                            <span className="md:hidden text-slate-500">RPE:</span> {log.rpe}
                                                        </td>
                                                        <td className="px-6 md:py-4 text-slate-300 md:text-center flex justify-between md:table-cell py-1">
                                                            <span className="md:hidden text-slate-500">Duración:</span> {log.duracion} min
                                                        </td>
                                                        <td className="px-6 md:py-4 font-mono text-orange-400 md:text-center flex justify-between md:table-cell py-1 font-bold">
                                                            <span className="md:hidden text-slate-500 font-normal">sRPE:</span> {log.srpe}
                                                        </td>
                                                        <td className="px-6 md:py-4 text-slate-500 md:text-center hidden md:table-cell">
                                                            {log.semana_del_ano}
                                                        </td>
                                                    </>
                                                )}
                                                <td className="px-6 py-4 md:text-right mt-2 md:mt-0 flex justify-end gap-2">
                                                    {editingId === log.id ? (
                                                        <>
                                                            <button onClick={() => saveEdit(log)} className="text-green-500 hover:text-white hover:bg-green-600 bg-green-500/10 px-3 py-1.5 rounded text-xs transition-colors">Guardar</button>
                                                            <button onClick={() => setEditingId(null)} className="text-slate-400 hover:text-white hover:bg-slate-600 bg-slate-800 px-3 py-1.5 rounded text-xs transition-colors">Cancelar</button>
                                                        </>
                                                    ) : (
                                                        <>
                                                            <button onClick={() => startEdit(log)} className="text-blue-500 hover:text-white hover:bg-blue-600 bg-blue-500/10 px-3 py-1.5 rounded text-xs transition-colors">Editar</button>
                                                            <button
                                                                onClick={() => handleDelete(log.id)}
                                                                disabled={deletingId === log.id}
                                                                className="text-red-500 hover:text-white hover:bg-red-600 bg-red-500/10 px-3 py-1.5 rounded text-xs transition-colors disabled:opacity-50"
                                                            >
                                                                {deletingId === log.id ? 'Borrando...' : 'Eliminar'}
                                                            </button>
                                                        </>
                                                    )}
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            if (loading) return (
                <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center">
                    <div className="w-12 h-12 border-4 border-slate-800 border-t-orange-500 rounded-full animate-spin"></div>
                </div>
            );

            return user ? <AdminDashboard user={user} onLogout={() => auth.signOut()} /> : <LoginView />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>

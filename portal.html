<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal del Atleta | Coach León</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #ffffff;
        }
    </style>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Icons as robust SVGs inline
        const IconUser = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconLock = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconActivity = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
        const IconTrendingUp = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const IconCalendar = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
        const IconZap = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
        const IconTarget = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconLogOut = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
        const IconArrowUp = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>;

        const mockAthleteData = {
            name: "Matias",
            status: "Plan Mensual: Activo",
            profileImg: "https://api.dicebear.com/7.x/avataaars/svg?seed=Matias&backgroundColor=f97316",
            summary: {
                bodyWeight: "74.9 kg",
                relativeStrength: "2.1x",
                nextGoal: "Comp. 14 Marzo"
            },
            power: {
                date: "Última medición: 05 de Marzo, 2026",
                cmj: { current: "42 cm", prev: "40 cm", diff: "+2 cm" },
                abalakov: { current: "47 cm", prev: "46 cm", diff: "+1 cm" },
                dropJump: { height: "38 cm", rsi: "2.4", diff: "+0.2" },
                broadJump: { current: "2.45 m", diff: "+0.05 m" }
            },
            strength: {
                date: "Última medición: 03 de Marzo, 2026",
                squat: { current: "140 kg", diff: "+5 kg" },
                bench: { current: "95 kg", diff: "+2.5 kg" },
                deadlift: { current: "165 kg", diff: "+10 kg" },
                pullups: { weight: "+20 kg", reps: "5", diff: "+2.5 kg" }
            },
            grappling: {
                date: "Última medición: 01 de Marzo, 2026",
                gripStrength: { current: "58 kg", diff: "+1.5 kg" },
                kimonoReps: { current: "12 reps", diff: "+2 reps" }
            }
        };

        const TrendBadge = ({ diff }) => (
            <span className="flex items-center text-xs text-green-500 font-semibold bg-green-500/10 px-1.5 py-0.5 rounded border border-green-500/20">
                <IconArrowUp className="w-3 h-3 mr-0.5" />
                {diff}
            </span>
        );

        const LoginView = ({ onLogin }) => {
            return (
                <div className="min-h-screen bg-slate-950 flex flex-col justify-center items-center p-4">
                    <div className="w-full max-w-sm">
                        <div className="text-center mb-10">
                            <h1 className="text-3xl font-bold text-white tracking-tight">
                                Coach<span className="text-orange-500">León</span>
                            </h1>
                            <p className="text-slate-400 mt-2 text-sm uppercase tracking-widest font-semibold">
                                Portal del Atleta
                            </p>
                        </div>

                        <div className="bg-slate-900 rounded-2xl p-6 border border-slate-800 shadow-2xl">
                            <form onSubmit={(e) => { e.preventDefault(); onLogin(); }} className="space-y-5">
                                <div>
                                    <label className="block text-slate-400 text-xs uppercase tracking-wider mb-2">Correo Electrónico</label>
                                    <div className="relative">
                                        <IconUser className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500" />
                                        <input 
                                            type="email" 
                                            className="w-full bg-slate-950 border border-slate-800 rounded-lg py-3 pl-10 pr-4 text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-colors"
                                            placeholder="atleta@correo.com"
                                            required
                                        />
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-slate-400 text-xs uppercase tracking-wider mb-2">Contraseña</label>
                                    <div className="relative">
                                        <IconLock className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500" />
                                        <input 
                                            type="password" 
                                            className="w-full bg-slate-950 border border-slate-800 rounded-lg py-3 pl-10 pr-4 text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-colors"
                                            placeholder="••••••••"
                                            required
                                        />
                                    </div>
                                </div>

                                <button 
                                    type="submit"
                                    className="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 rounded-lg transition-colors mt-4 shadow-lg shadow-orange-600/20"
                                >
                                    Iniciar Sesión
                                </button>
                            </form>
                        </div>

                        <p className="text-center text-slate-500 text-xs mt-8 px-4 leading-relaxed">
                            El acceso es exclusivo para atletas activos. Las cuentas nuevas permanecen en estado <span className="text-orange-500 font-medium">'Pendiente'</span> hasta la aprobación de Coach León.
                        </p>
                    </div>
                </div>
            );
        };

        const DashboardView = ({ onLogout, data }) => {
            return (
                <div className="min-h-screen bg-slate-950 text-white pb-10">
                    <header className="sticky top-0 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 z-10 px-4 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <img src={data.profileImg} alt="Perfil" className="w-12 h-12 rounded-full border-2 border-slate-700 bg-slate-800" />
                            <div>
                                <h2 className="text-lg font-bold">Hola, {data.name}</h2>
                                <div className="flex items-center gap-1.5 mt-0.5">
                                    <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                    <span className="text-xs text-green-400 font-medium tracking-wide">{data.status}</span>
                                </div>
                            </div>
                        </div>
                        <button onClick={onLogout} className="p-2 text-slate-400 hover:text-white transition-colors bg-slate-800 rounded-lg" title="Cerrar Sesión">
                            <IconLogOut className="w-5 h-5" />
                        </button>
                    </header>

                    <main className="p-4 space-y-6 max-w-lg mx-auto mt-2">
                        <div className="grid grid-cols-3 gap-3">
                            <div className="bg-slate-900 border border-slate-800 rounded-xl p-3 flex flex-col items-center justify-center text-center">
                                <IconActivity className="w-5 h-5 text-orange-500 mb-2" />
                                <span className="text-[10px] text-slate-400 uppercase tracking-widest block mb-1">Peso</span>
                                <span className="font-bold text-lg">{data.summary.bodyWeight}</span>
                            </div>
                            <div className="bg-slate-900 border border-slate-800 rounded-xl p-3 flex flex-col items-center justify-center text-center">
                                <IconTrendingUp className="w-5 h-5 text-orange-500 mb-2" />
                                <span className="text-[10px] text-slate-400 uppercase tracking-widest block mb-1">Fza Rel.</span>
                                <span className="font-bold text-lg">{data.summary.relativeStrength}</span>
                            </div>
                            <div className="bg-slate-900 border border-slate-800 rounded-xl p-3 flex flex-col items-center justify-center text-center">
                                <IconCalendar className="w-5 h-5 text-orange-500 mb-2" />
                                <span className="text-[10px] text-slate-400 uppercase tracking-widest block mb-1">Objetivo</span>
                                <span className="font-bold text-sm leading-tight">{data.summary.nextGoal}</span>
                            </div>
                        </div>

                        <section className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-lg">
                            <div className="bg-slate-800/50 p-4 border-b border-slate-800 flex flex-col gap-1">
                                <div className="flex items-center gap-2">
                                    <IconZap className="w-5 h-5 text-yellow-500" />
                                    <h3 className="font-bold tracking-wide">Potencia (Tren Inferior)</h3>
                                </div>
                                <span className="text-xs text-slate-400">{data.power.date}</span>
                            </div>
                            <div className="p-4">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-800/50">
                                        <span className="text-[11px] text-slate-400 block mb-1 font-medium truncate">CMJ</span>
                                        <div className="flex items-baseline gap-2">
                                            <span className="text-xl font-bold text-white">{data.power.cmj.current}</span>
                                            <TrendBadge diff={data.power.cmj.diff} />
                                        </div>
                                    </div>
                                    <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-800/50">
                                        <span className="text-[11px] text-slate-400 block mb-1 font-medium truncate">Abalakov</span>
                                        <div className="flex items-baseline gap-2">
                                            <span className="text-xl font-bold text-white">{data.power.abalakov.current}</span>
                                            <TrendBadge diff={data.power.abalakov.diff} />
                                        </div>
                                    </div>
                                    <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-800/50 col-span-2 sm:col-span-1">
                                        <span className="text-[11px] text-slate-400 block mb-1 font-medium truncate">Salto Horiz.</span>
                                        <div className="flex items-baseline gap-2">
                                            <span className="text-xl font-bold text-white">{data.power.broadJump.current}</span>
                                            <TrendBadge diff={data.power.broadJump.diff} />
                                        </div>
                                    </div>
                                    <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-800/50 col-span-2 sm:col-span-1 flex flex-col justify-between">
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="text-[11px] text-slate-400 font-medium truncate">Drop Jump</span>
                                            <span className="text-[10px] text-orange-400 font-bold bg-orange-500/10 px-1 rounded">RSI: {data.power.dropJump.rsi}</span>
                                        </div>
                                        <div className="flex items-baseline gap-2">
                                            <span className="text-xl font-bold text-white">{data.power.dropJump.height}</span>
                                            <TrendBadge diff={data.power.dropJump.diff} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section className="bg-gradient-to-br from-orange-950/40 to-slate-900 border border-orange-900/30 rounded-xl overflow-hidden relative shadow-lg">
                            <div className="absolute top-0 right-0 p-4 opacity-5">
                                <IconTarget className="w-32 h-32" />
                            </div>
                            <div className="p-4 border-b border-orange-900/20 relative z-10 flex flex-col gap-1">
                                <h3 className="font-bold tracking-wide text-orange-400">Rendimiento Específico (Tatami)</h3>
                                <span className="text-xs text-slate-400">{data.grappling.date}</span>
                            </div>
                            <div className="p-4 grid grid-cols-2 gap-4 relative z-10">
                                <div className="bg-slate-900/60 backdrop-blur rounded-lg p-3 border border-slate-800 shadow-inner">
                                    <span className="text-xs text-slate-300 block mb-1 font-medium">Agarre (Grip)</span>
                                    <div className="flex items-baseline gap-2">
                                        <span className="text-xl font-bold text-white">{data.grappling.gripStrength.current}</span>
                                        <TrendBadge diff={data.grappling.gripStrength.diff} />
                                    </div>
                                </div>
                                <div className="bg-slate-900/60 backdrop-blur rounded-lg p-3 border border-slate-800 shadow-inner">
                                    <span className="text-xs text-slate-300 block mb-1 font-medium">Reps Kimono</span>
                                    <div className="flex items-baseline gap-2">
                                        <span className="text-xl font-bold text-white">{data.grappling.kimonoReps.current}</span>
                                        <TrendBadge diff={data.grappling.kimonoReps.diff} />
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-lg">
                            <div className="bg-slate-800/50 p-4 border-b border-slate-800 flex flex-col gap-1">
                                <h3 className="font-bold tracking-wide">Fuerza Máxima (RM Indirecto)</h3>
                                <span className="text-xs text-slate-400">{data.strength.date}</span>
                            </div>
                            <div className="divide-y divide-slate-800">
                                <div className="flex justify-between items-center p-4 hover:bg-slate-800/30 transition-colors">
                                    <span className="text-slate-300 font-medium">Back Squat</span>
                                    <div className="flex items-center gap-3">
                                        <span className="font-bold text-lg">{data.strength.squat.current}</span>
                                        <TrendBadge diff={data.strength.squat.diff} />
                                    </div>
                                </div>
                                <div className="flex justify-between items-center p-4 hover:bg-slate-800/30 transition-colors">
                                    <span className="text-slate-300 font-medium">Bench Press</span>
                                    <div className="flex items-center gap-3">
                                        <span className="font-bold text-lg">{data.strength.bench.current}</span>
                                        <TrendBadge diff={data.strength.bench.diff} />
                                    </div>
                                </div>
                                <div className="flex justify-between items-center p-4 hover:bg-slate-800/30 transition-colors">
                                    <span className="text-slate-300 font-medium">Deadlift</span>
                                    <div className="flex items-center gap-3">
                                        <span className="font-bold text-lg">{data.strength.deadlift.current}</span>
                                        <TrendBadge diff={data.strength.deadlift.diff} />
                                    </div>
                                </div>
                                <div className="flex justify-between items-center p-4 hover:bg-slate-800/30 transition-colors">
                                    <div className="flex flex-col">
                                        <span className="text-slate-300 font-medium">Dominadas Lastradas</span>
                                        <span className="text-[10px] text-orange-400 font-semibold tracking-wide uppercase mt-0.5">{data.strength.pullups.reps} Repeticiones</span>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <span className="font-bold text-lg">{data.strength.pullups.weight}</span>
                                        <TrendBadge diff={data.strength.pullups.diff} />
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>
                </div>
            );
        };

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);

            return (
                <React.Fragment>
                    {!isAuthenticated ? (
                        <LoginView onLogin={() => setIsAuthenticated(true)} />
                    ) : (
                        <DashboardView 
                            data={mockAthleteData} 
                            onLogout={() => setIsAuthenticated(false)} 
                        />
                    )}
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>

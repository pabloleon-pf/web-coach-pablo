<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | Coach León</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #ffffff;
        }
    </style>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCdgdlZ9DHy6c3joXiWbWqUJJ4cPAwJeMc",
            authDomain: "webcoachleon.firebaseapp.com",
            projectId: "webcoachleon",
            storageBucket: "webcoachleon.firebasestorage.app",
            messagingSenderId: "1010557067374",
            appId: "1:1010557067374:web:d22ec870bc6165e1fd867f"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        const InputField = ({ label, path, placeholder = "", formData, selectedEmail, updateField }) => {
            // Determine value securely
            const val = path.split('.').reduce((acc, part) => acc && acc[part] !== undefined ? acc[part] : '', formData);
            return (
                <div className="flex flex-col">
                    <label className="text-xs text-slate-400 mb-1 font-semibold">{label}</label>
                    <input
                        type="text"
                        value={val}
                        onChange={(e) => updateField(path, e.target.value)}
                        placeholder={placeholder}
                        disabled={path === 'email' && selectedEmail !== 'NEW'}
                        className="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-orange-500 disabled:opacity-50 transition-colors"
                    />
                </div>
            );
        };

        const AdminDashboard = ({ user, onLogout }) => {
            const [athletes, setAthletes] = useState([]);
            const [selectedEmail, setSelectedEmail] = useState(null);

            // Initial empty structure to prevent errors
            const emptyAthlete = {
                name: '',
                status: 'Activo',
                email: '',
                summary: { bodyWeight: '', relativeStrength: '', nextGoal: '' },
                power: {
                    date: '',
                    cmj: { current: '', diff: '' },
                    abalakov: { current: '', diff: '' },
                    broadJump: { current: '', diff: '' },
                    dropJump: { height: '', rsi: '', diff: '' }
                },
                grappling: {
                    date: '',
                    gripStrength: { current: '', diff: '' },
                    kimonoReps: { current: '', diff: '' }
                },
                strength: {
                    date: '',
                    squat: { current: '', diff: '' },
                    bench: { current: '', diff: '' },
                    deadlift: { current: '', diff: '' },
                    pullups: { weight: '', reps: '', diff: '' }
                }
            };

            const [formData, setFormData] = useState(emptyAthlete);
            const [saving, setSaving] = useState(false);
            const [msg, setMsg] = useState('');

            useEffect(() => {
                // Fetch all athletes
                const unsubscribe = db.collection("athletes").onSnapshot((snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => {
                        list.push({ id: doc.id, ...doc.data() });
                    });
                    setAthletes(list);
                });
                return () => unsubscribe();
            }, []);

            const handleSelect = (athlete) => {
                const mergedAthlete = { ...emptyAthlete, ...athlete, email: athlete.id };
                // Ensure nested structures are preserved even if they don't exist in DB yet
                mergedAthlete.summary = { ...emptyAthlete.summary, ...(athlete.summary || {}) };
                mergedAthlete.power = { ...emptyAthlete.power, ...(athlete.power || {}) };
                mergedAthlete.grappling = { ...emptyAthlete.grappling, ...(athlete.grappling || {}) };
                mergedAthlete.strength = { ...emptyAthlete.strength, ...(athlete.strength || {}) };

                // Deep merge nested items (cmj, dropJump, etc) to avoid undefined errors in form
                ['cmj', 'abalakov', 'broadJump', 'dropJump'].forEach(k => {
                    if (mergedAthlete.power[k]) mergedAthlete.power[k] = { ...emptyAthlete.power[k], ...mergedAthlete.power[k] };
                });
                ['gripStrength', 'kimonoReps'].forEach(k => {
                    if (mergedAthlete.grappling[k]) mergedAthlete.grappling[k] = { ...emptyAthlete.grappling[k], ...mergedAthlete.grappling[k] };
                });
                ['squat', 'bench', 'deadlift', 'pullups'].forEach(k => {
                    if (mergedAthlete.strength[k]) mergedAthlete.strength[k] = { ...emptyAthlete.strength[k], ...mergedAthlete.strength[k] };
                });

                setSelectedEmail(athlete.id);
                setFormData(mergedAthlete);
                setMsg('');
            };

            const handleNew = () => {
                setSelectedEmail('NEW');
                setFormData({ ...emptyAthlete });
                setMsg('');
            };

            const handleSave = async (e) => {
                e.preventDefault();
                setSaving(true);
                setMsg('');
                try {
                    const docId = formData.email.trim();
                    if (!docId) throw new Error("Debes especificar el correo electrónico.");

                    const dataToSave = { ...formData };
                    delete dataToSave.email; // Don't save email in body, auth is by ID
                    delete dataToSave.id;

                    await db.collection("athletes").doc(docId).set(dataToSave, { merge: true });
                    setMsg("¡Atleta guardado con éxito!");
                    if (selectedEmail === 'NEW') setSelectedEmail(docId);
                } catch (err) {
                    let errMsg = "Error al guardar: ";
                    if (err.message.includes("permission-denied")) {
                        errMsg += "Permiso denegado. Asegúrate de configurar las reglas en Firebase Firestore para permitir lectura/escritura (Test Mode).";
                    } else {
                        errMsg += err.message;
                    }
                    setMsg(errMsg);
                }
                setSaving(false);
            };

            // Helpers for deep updates
            const updateField = (path, value) => {
                const keys = path.split('.');
                setFormData(prev => {
                    const newData = { ...prev };
                    let current = newData;
                    for (let i = 0; i < keys.length - 1; i++) {
                        current[keys[i]] = { ...current[keys[i]] };
                        current = current[keys[i]];
                    }
                    current[keys[keys.length - 1]] = value;
                    return newData;
                });
            };

            return (
                <div className="min-h-screen flex text-white relative">
                    {/* Sidebar: List of athletes */}
                    <aside className="w-80 bg-slate-900 border-r border-slate-800 p-4 fixed h-full overflow-y-auto hidden md:block z-10">
                        <h2 className="text-2xl font-bold text-white mb-6 tracking-tight">
                            Coach<span className="text-orange-500">León</span> <span className="text-sm text-slate-400 font-normal">Admin</span>
                        </h2>
                        <button
                            onClick={handleNew}
                            className="w-full bg-orange-600 hover:bg-orange-500 border border-orange-500 text-white font-bold py-3 rounded-xl mb-6 shadow-lg shadow-orange-600/20 transition-all"
                        >
                            + Nuevo Atleta
                        </button>

                        <h3 className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Tus Atletas ({athletes.length})</h3>
                        <div className="space-y-2">
                            {athletes.map(a => (
                                <button
                                    key={a.id}
                                    onClick={() => handleSelect(a)}
                                    className={`w-full text-left px-4 py-3 rounded-xl text-sm transition-all flex items-center gap-3 ${selectedEmail === a.id ? 'bg-orange-500/10 border border-orange-500/50 text-orange-400' : 'hover:bg-slate-800 border border-transparent text-slate-300'}`}
                                >
                                    <div className="w-8 h-8 rounded-full bg-slate-800 overflow-hidden shrink-0 border border-slate-700">
                                        <img src={a.profileImg || `https://api.dicebear.com/7.x/avataaars/svg?seed=${a.name}&backgroundColor=0f172a`} alt="Avatar" className="w-full h-full object-cover" />
                                    </div>
                                    <div className="min-w-0">
                                        <div className="font-semibold truncate text-white">{a.name || 'Sin nombre'}</div>
                                        <div className="text-[10px] text-slate-500 truncate">{a.id}</div>
                                    </div>
                                </button>
                            ))}
                            {athletes.length === 0 && (
                                <p className="text-sm text-slate-500 text-center py-4 bg-slate-950 rounded-lg border border-slate-800 border-dashed">No hay atletas registrados aún.</p>
                            )}
                        </div>
                    </aside>

                    {/* Main Content: Form */}
                    <main className="flex-1 md:ml-80 p-6 md:p-10">
                        <header className="flex justify-between items-center mb-10 pb-6 border-b border-slate-800">
                            <div>
                                <h1 className="text-3xl font-bold tracking-tight">
                                    {selectedEmail === 'NEW' ? 'Crear Nuevo Atleta' : selectedEmail ? `Panel de: ${formData.name || 'Sin Nombre'}` : 'Selecciona un atleta'}
                                </h1>
                                {selectedEmail && selectedEmail !== 'NEW' && (
                                    <p className="text-sm text-slate-400 mt-1">ID: <span className="text-slate-300 font-mono">{selectedEmail}</span></p>
                                )}
                            </div>
                            <button onClick={onLogout} className="text-sm font-semibold text-slate-400 hover:text-white bg-slate-900 px-4 py-2 rounded-lg border border-slate-800 transition-colors">
                                Cerrar Sesión
                            </button>
                        </header>

                        {selectedEmail && (
                            <form onSubmit={handleSave} className="space-y-8 max-w-5xl">
                                {/* Información General */}
                                <section className="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
                                    <div className="flex items-center gap-2 mb-6 border-b border-slate-800 pb-4">
                                        <div className="w-2 h-6 bg-orange-500 rounded-full"></div>
                                        <h3 className="text-xl font-bold">Información Básica</h3>
                                        <p className="text-xs text-slate-500 font-medium ml-2 uppercase tracking-widest">(Configuración Principal)</p>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        <InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Correo Electrónico (Login ID)" path="email" placeholder="ej. usuario@correo.com" />
                                        <InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Nombre Completo" path="name" />
                                        <div className="flex flex-col">
                                            <label className="text-xs text-slate-400 mb-1 font-semibold">Estado del Atleta</label>
                                            <select
                                                value={formData.status}
                                                onChange={(e) => updateField('status', e.target.value)}
                                                className="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-orange-500 w-full"
                                            >
                                                <option value="Activo">Activo (Entrenando)</option>
                                                <option value="Competición">En Fase de Competición</option>
                                                <option value="Lesionado">Lesionado / Recuperación</option>
                                                <option value="Inactivo">Inactivo</option>
                                            </select>
                                        </div>
                                        <InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="URL Foto Perfil (Opcional)" path="profileImg" placeholder="https://..." />
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6 pt-6 border-t border-slate-800/50">
                                        <InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Peso Corporal" path="summary.bodyWeight" placeholder="ej. 75 kg" />
                                        <InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Fuerza Relativa" path="summary.relativeStrength" placeholder="ej. 2.5x BW" />
                                        <InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Próximo Objetivo" path="summary.nextGoal" placeholder="ej. Torneo Suramericano" />
                                    </div>
                                </section>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    {/* Potencia */}
                                    <section className="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
                                        <div className="flex items-center justify-between border-b border-slate-800 pb-4 mb-6">
                                            <div className="flex items-center gap-2">
                                                <div className="w-2 h-6 bg-yellow-500 rounded-full"></div>
                                                <h3 className="text-xl font-bold">Potencia</h3>
                                            </div>
                                            <div className="w-40">
                                                <input
                                                    type="text"
                                                    value={formData.power.date || ''}
                                                    onChange={(e) => updateField('power.date', e.target.value)}
                                                    placeholder="Fecha (ej. 10 Mar)"
                                                    className="bg-slate-950 border border-slate-700 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-orange-500 w-full text-right"
                                                />
                                            </div>
                                        </div>

                                        <div className="space-y-6">
                                            {[
                                                { title: 'CMJ', pathKey: 'cmj', placeholders: ['45 cm', '+2 cm'] },
                                                { title: 'Abalakov', pathKey: 'abalakov', placeholders: ['52 cm', '+3 cm'] },
                                                { title: 'Salto Horizontal', pathKey: 'broadJump', placeholders: ['2.8 m', '+0.1 m'] }
                                            ].map((item, idx) => (
                                                <div key={idx} className="flex gap-4 p-4 bg-slate-950/50 rounded-xl border border-slate-800/50">
                                                    <div className="w-1/3 flex items-center font-semibold text-slate-300">{item.title}</div>
                                                    <div className="w-1/3"><InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Marca Actual" path={`power.${item.pathKey}.current`} placeholder={item.placeholders[0]} /></div>
                                                    <div className="w-1/3"><InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Progreso" path={`power.${item.pathKey}.diff`} placeholder={item.placeholders[1]} /></div>
                                                </div>
                                            ))}

                                            <div className="flex flex-col gap-4 p-4 bg-orange-950/20 rounded-xl border border-orange-900/40">
                                                <div className="font-semibold text-orange-400">Drop Jump (Reactividad)</div>
                                                <div className="grid grid-cols-3 gap-4">
                                                    <InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Altura" path="power.dropJump.height" placeholder="42 cm" />
                                                    <InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="RSI" path="power.dropJump.rsi" placeholder="2.1" />
                                                    <InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Progreso" path="power.dropJump.diff" placeholder="+0.2 RSI" />
                                                </div>
                                            </div>
                                        </div>
                                    </section>

                                    {/* Fuerza */}
                                    <section className="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
                                        <div className="flex items-center justify-between border-b border-slate-800 pb-4 mb-6">
                                            <div className="flex items-center gap-2">
                                                <div className="w-2 h-6 bg-red-500 rounded-full"></div>
                                                <h3 className="text-xl font-bold">Fuerza Máxima</h3>
                                            </div>
                                            <div className="w-40">
                                                <input
                                                    type="text"
                                                    value={formData.strength.date || ''}
                                                    onChange={(e) => updateField('strength.date', e.target.value)}
                                                    placeholder="Fecha (ej. 10 Mar)"
                                                    className="bg-slate-950 border border-slate-700 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-red-500 w-full text-right"
                                                />
                                            </div>
                                        </div>

                                        <div className="space-y-6">
                                            {[
                                                { title: 'Back Squat', pathKey: 'squat', placeholders: ['140 kg', '+5 kg'] },
                                                { title: 'Bench Press', pathKey: 'bench', placeholders: ['100 kg', '+2 kg'] },
                                                { title: 'Deadlift', pathKey: 'deadlift', placeholders: ['180 kg', '+10 kg'] }
                                            ].map((item, idx) => (
                                                <div key={idx} className="flex gap-4 p-4 bg-slate-950/50 rounded-xl border border-slate-800/50">
                                                    <div className="w-1/3 flex items-center font-semibold text-slate-300">{item.title}</div>
                                                    <div className="w-1/3"><InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="RM Actual" path={`strength.${item.pathKey}.current`} placeholder={item.placeholders[0]} /></div>
                                                    <div className="w-1/3"><InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Progreso" path={`strength.${item.pathKey}.diff`} placeholder={item.placeholders[1]} /></div>
                                                </div>
                                            ))}

                                            <div className="flex flex-col gap-4 p-4 bg-slate-950/50 rounded-xl border border-slate-800/50">
                                                <div className="font-semibold text-slate-300">Dominadas Lastradas</div>
                                                <div className="grid grid-cols-3 gap-4">
                                                    <InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Peso Extra" path="strength.pullups.weight" placeholder="+20 kg" />
                                                    <InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Repeticiones" path="strength.pullups.reps" placeholder="5" />
                                                    <InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Progreso" path="strength.pullups.diff" placeholder="+1 rep" />
                                                </div>
                                            </div>
                                        </div>
                                    </section>
                                </div>

                                {/* Grappling */}
                                <section className="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl relative overflow-hidden">
                                    <div className="flex items-center justify-between border-b border-slate-800 pb-4 mb-6 z-10 relative">
                                        <div className="flex items-center gap-2">
                                            <div className="w-2 h-6 bg-blue-500 rounded-full"></div>
                                            <h3 className="text-xl font-bold">Rendimiento Específico (Grappling)</h3>
                                        </div>
                                        <div className="w-40">
                                            <input
                                                type="text"
                                                value={formData.grappling.date || ''}
                                                onChange={(e) => updateField('grappling.date', e.target.value)}
                                                placeholder="Fecha (ej. 10 Mar)"
                                                className="bg-slate-950 border border-slate-700 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-blue-500 w-full text-right"
                                            />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-10">
                                        <div className="flex gap-4 p-4 bg-slate-950/50 rounded-xl border border-slate-800/50">
                                            <div className="w-1/3 flex items-center font-semibold text-slate-300 text-sm">Agarre (Grip)</div>
                                            <div className="w-1/3"><InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Marca Actual" path="grappling.gripStrength.current" placeholder="65 kg" /></div>
                                            <div className="w-1/3"><InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Progreso" path="grappling.gripStrength.diff" placeholder="+2 kg" /></div>
                                        </div>
                                        <div className="flex gap-4 p-4 bg-slate-950/50 rounded-xl border border-slate-800/50">
                                            <div className="w-1/3 flex items-center font-semibold text-slate-300 text-sm">Reps Kimono (Pull)</div>
                                            <div className="w-1/3"><InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Repeticiones" path="grappling.kimonoReps.current" placeholder="18" /></div>
                                            <div className="w-1/3"><InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Progreso" path="grappling.kimonoReps.diff" placeholder="+3 reps" /></div>
                                        </div>
                                    </div>
                                </section>

                                {/* FIXED ACTION BAR at the bottom */}
                                <div className="sticky bottom-4 z-50 bg-slate-900/90 backdrop-blur border border-slate-800 p-4 rounded-2xl shadow-2xl flex items-center justify-between mt-10">
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700">
                                            <img src={formData.profileImg || `https://api.dicebear.com/7.x/avataaars/svg?seed=${formData.name}&backgroundColor=0f172a`} alt="" className="w-10 h-10 rounded-full" />
                                        </div>
                                        <div>
                                            <p className="text-sm font-bold">{formData.name || 'Atleta Sin Nombre'}</p>
                                            <p className="text-xs text-slate-500">{formData.email || 'Complete el email'}</p>
                                        </div>
                                    </div>

                                    <div className="flex items-center gap-4">
                                        {msg && (
                                            <div className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 animate-bounce ${msg.includes('Error') ? 'bg-red-500/10 text-red-500 border border-red-500/20' : 'bg-green-500/10 text-green-500 border border-green-500/20'}`}>
                                                {msg.includes('Error') ? '❌' : '✅'} {msg}
                                            </div>
                                        )}
                                        <button
                                            type="submit"
                                            disabled={saving}
                                            className="bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 px-10 rounded-xl disabled:opacity-50 transition-all shadow-lg shadow-orange-600/30 text-lg flex items-center gap-2"
                                        >
                                            {saving ? (
                                                <><span className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span> Guardando...</>
                                            ) : (
                                                'Guardar Cambios en Base de Datos'
                                            )}
                                        </button>
                                    </div>
                                </div>
                            </form>
                        )}

                        {!selectedEmail && (
                            <div className="flex flex-col items-center justify-center h-[60vh] text-slate-500 border-2 border-dashed border-slate-800 rounded-3xl">
                                <h2 className="text-2xl font-bold mb-2">Bienvenido, Coach León</h2>
                                <p>Selecciona un atleta del panel lateral izquierdo para ver y editar sus métricas.</p>
                                <button
                                    onClick={handleNew}
                                    className="mt-6 bg-slate-800 hover:bg-slate-700 text-white font-semibold py-2 px-6 rounded-lg transition-colors border border-slate-700"
                                >
                                    O registra un nuevo atleta aquí
                                </button>
                            </div>
                        )}
                    </main>
                </div>
            )
        }

        const LoginView = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (err) {
                    setError("Acceso denegado. Credenciales incorrectas.");
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-950 p-4">
                    <form onSubmit={handleSubmit} className="bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-2xl w-full max-w-sm">
                        <div className="text-center mb-8">
                            <h2 className="text-3xl font-bold text-white tracking-tight">Coach<span className="text-orange-500">León</span></h2>
                            <p className="text-orange-500/80 text-sm font-semibold uppercase tracking-widest mt-1">Panel de Administrador</p>
                        </div>

                        <div className="space-y-5">
                            <div>
                                <label className="block text-xs uppercase text-slate-400 font-semibold mb-2">Correo Autenticado</label>
                                <input
                                    type="email"
                                    value={email} onChange={e => setEmail(e.target.value)}
                                    placeholder="tu@correo.com"
                                    className="w-full bg-slate-950 border border-slate-700 rounded-xl py-3 px-4 focus:outline-none focus:border-orange-500 text-white transition-colors"
                                    required
                                />
                            </div>
                            <div>
                                <label className="block text-xs uppercase text-slate-400 font-semibold mb-2">Contraseña</label>
                                <input
                                    type="password"
                                    value={password} onChange={e => setPassword(e.target.value)}
                                    placeholder="••••••••"
                                    className="w-full bg-slate-950 border border-slate-700 rounded-xl py-3 px-4 focus:outline-none focus:border-orange-500 text-white transition-colors"
                                    required
                                />
                            </div>

                            {error && <p className="text-red-500 text-sm text-center bg-red-500/10 py-2 rounded-lg border border-red-500/20">{error}</p>}

                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 rounded-xl mt-4 shadow-lg shadow-orange-600/20 disabled:opacity-50 transition-colors"
                            >
                                {loading ? 'Validando...' : 'Acceder al Gestor'}
                            </button>
                        </div>
                    </form>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            if (loading) return (
                <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center">
                    <div className="w-12 h-12 border-4 border-slate-800 border-t-orange-500 rounded-full animate-spin"></div>
                </div>
            );

            return user ? <AdminDashboard user={user} onLogout={() => auth.signOut()} /> : <LoginView />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | Coach León</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #ffffff;
        }
    </style>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCdgdlZ9DHy6c3joXiWbWqUJJ4cPAwJeMc",
            authDomain: "webcoachleon.firebaseapp.com",
            projectId: "webcoachleon",
            storageBucket: "webcoachleon.firebasestorage.app",
            messagingSenderId: "1010557067374",
            appId: "1:1010557067374:web:d22ec870bc6165e1fd867f"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        const InputField = ({ label, path, placeholder = "", formData, selectedEmail, updateField }) => {
            // Determine value securely
            const val = path.split('.').reduce((acc, part) => acc && acc[part] !== undefined ? acc[part] : '', formData);
            return (
                <div className="flex flex-col">
                    <label className="text-xs text-slate-400 mb-1 font-semibold">{label}</label>
                    <input
                        type="text"
                        value={val}
                        onChange={(e) => updateField(path, e.target.value)}
                        placeholder={placeholder}
                        disabled={path === 'email' && selectedEmail !== 'NEW'}
                        className="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-orange-500 disabled:opacity-50 transition-colors"
                    />
                </div>
            );
        };

        const AdminDashboard = ({ user, onLogout }) => {
            const [athletes, setAthletes] = useState([]);
            const [selectedEmail, setSelectedEmail] = useState(null);

            const [importing, setImporting] = useState(false);
            const fileInputRef = React.useRef(null);

            // Initial empty structure to prevent errors
            const emptyEvaluation = {
                date: '',
                power: {
                    cmj: { current: '' },
                    abalakov: { current: '' },
                    broadJump: { current: '' },
                    dropJump: { height: '', rsi: '' }
                },
                grappling: {
                    gripStrength: { current: '' },
                    kimonoReps: { current: '' }
                },
                strength: {
                    squat: { current: '' },
                    bench: { current: '' },
                    deadlift: { current: '' },
                    pullups: { weight: '', reps: '' }
                }
            };

            const emptyAthlete = {
                name: '',
                status: 'Activo',
                email: '',
                profileImg: '',
                summary: { bodyWeight: '', relativeStrength: '', nextGoal: '' },
                evaluations: []
            };

            const [formData, setFormData] = useState(emptyAthlete);
            const [saving, setSaving] = useState(false);
            const [msg, setMsg] = useState('');

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (event) => {
                    setImporting(true);
                    setMsg('Procesando archivo CSV...');
                    try {
                        const text = event.target.result;
                        await processCSV(text);
                    } catch (err) {
                        setMsg(`Error al procesar CSV: ${err.message}`);
                    }
                    setImporting(false);
                    if (fileInputRef.current) fileInputRef.current.value = ""; // Reset input
                };
                reader.readAsText(file);
            };

            const processCSV = async (csvText) => {
                const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== '');
                if (lines.length < 2) throw new Error("El archivo está vacío o no tiene datos suficientes.");

                const separator = lines[0].includes(';') ? ';' : ',';
                const headers = lines[0].split(separator).map(h => h.trim().toLowerCase().replace(/"/g, ''));

                const getCol = (row, potentialNames) => {
                    for (let name of potentialNames) {
                        const idx = headers.findIndex(h => h.includes(name));
                        if (idx !== -1 && row[idx]) return row[idx].trim().replace(/"/g, '');
                    }
                    return '';
                };

                const batch = db.batch();
                let count = 0;
                const athletesCache = {}; // Cache to prevent overwriting when multiple rows exist for the same athlete

                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i].split(separator);
                    if (row.length < 2) continue;

                    const email = getCol(row, ['correo', 'email', 'mail']);
                    if (!email) continue;
                    const emailKey = email.toLowerCase();

                    let name = getCol(row, ['nombre', 'name', 'atleta']);
                    if (!name && headers[0] === '') {
                        name = row[0].trim().replace(/"/g, ''); // Fix for CSVs missing the 'Nombre' header
                    }

                    const status = getCol(row, ['estado', 'status']) || 'Activo';
                    const weight = getCol(row, ['peso', 'weight']);
                    const date = getCol(row, ['fecha', 'date']); // Remove default to today to prevent accidental current-day entries

                    const cmj = getCol(row, ['cmj']);
                    const abalakov = getCol(row, ['abalakov', 'aba']);
                    const broadJump = getCol(row, ['salto horizontal']);
                    const rsi = getCol(row, ['rsi']);

                    const squat = getCol(row, ['squat', 'sentadilla', 'back squat']);
                    const bench = getCol(row, ['bench', 'pecho', 'bench press']);
                    const deadlift = getCol(row, ['deadlift', 'peso muerto']);
                    const pullups = getCol(row, ['dominadas', 'pull-up (lastre kg)', 'pullup']);

                    const gripRight = getCol(row, ['handgrip derecha', 'handgrip d', 'grip d']);
                    const gripLeft = getCol(row, ['handgrip izquierda', 'handgrip i', 'grip i']);
                    let grip = '';
                    if (gripRight && gripLeft) grip = `${gripRight} (D) / ${gripLeft} (I)`;
                    else if (gripRight) grip = `${gripRight} (D)`;
                    else if (gripLeft) grip = `${gripLeft} (I)`;
                    else grip = getCol(row, ['handgrip']); // fallback

                    const kimono = getCol(row, ['rept con gi', 'kimono']);
                    const kimonoTime = getCol(row, ['tiempo con gi', 'tiempo']);

                    const athleteRef = db.collection('athletes').doc(emailKey);

                    // Fetch existing to append evaluation (use cache if available)
                    let athleteData;
                    if (athletesCache[emailKey]) {
                        athleteData = athletesCache[emailKey];
                    } else {
                        const docSnap = await athleteRef.get();
                        if (docSnap.exists) {
                            athleteData = docSnap.data();
                            // Safely copy evaluations to prevent Firebase array mutation bugs
                            athleteData.evaluations = athleteData.evaluations ? JSON.parse(JSON.stringify(athleteData.evaluations)) : [];
                        } else {
                            athleteData = { ...JSON.parse(JSON.stringify(emptyAthlete)), email: emailKey, name, status };
                        }
                        athletesCache[emailKey] = athleteData;
                    }

                    if (name && !athleteData.name) athleteData.name = name;

                    const isValidVal = (val) => val && val.trim() !== '' && val.trim() !== '0' && val.trim() !== '0.0';

                    if (isValidVal(weight)) {
                        if (!athleteData.summary) athleteData.summary = { ...emptyAthlete.summary };
                        athleteData.summary.bodyWeight = weight;
                    }

                    const newEval = JSON.parse(JSON.stringify(emptyEvaluation));
                    newEval.date = date;

                    let hasNewData = false;
                    if (date) {

                        if (isValidVal(cmj)) { newEval.power.cmj.current = cmj; hasNewData = true; }
                        if (isValidVal(abalakov)) { newEval.power.abalakov.current = abalakov; hasNewData = true; }
                        if (isValidVal(broadJump)) { newEval.power.broadJump.current = broadJump; hasNewData = true; }
                        if (isValidVal(rsi)) { newEval.power.dropJump.rsi = rsi; hasNewData = true; }

                        if (isValidVal(squat)) { newEval.strength.squat.current = squat; hasNewData = true; }
                        if (isValidVal(bench)) { newEval.strength.bench.current = bench; hasNewData = true; }
                        if (isValidVal(deadlift)) { newEval.strength.deadlift.current = deadlift; hasNewData = true; }
                        if (isValidVal(pullups)) { newEval.strength.pullups.weight = pullups; hasNewData = true; }

                        if (isValidVal(grip)) { newEval.grappling.gripStrength.current = grip; hasNewData = true; }
                        if (isValidVal(kimono)) { newEval.grappling.kimonoReps.current = kimono; hasNewData = true; }
                        if (isValidVal(kimonoTime)) { newEval.grappling.kimonoTime = { current: kimonoTime }; hasNewData = true; }

                        if (hasNewData) {
                            if (!athleteData.evaluations) athleteData.evaluations = [];

                            // Prevent duplicates by checking if an evaluation for this EXACT date already exists in the cache
                            const existingEvalIndex = athleteData.evaluations.findIndex(e => e.date === date);
                            if (existingEvalIndex >= 0) {
                                // Merge new data into the existing evaluation for this date to avoid duplicates
                                const existing = athleteData.evaluations[existingEvalIndex];

                                // Helper to safely set nested properties to avoid "Cannot set properties of undefined"
                                const safeSet = (obj, category, metric, field, val) => {
                                    if (!obj[category]) obj[category] = {};
                                    if (!obj[category][metric]) obj[category][metric] = {};
                                    obj[category][metric][field] = val;
                                };

                                if (isValidVal(cmj)) safeSet(existing, 'power', 'cmj', 'current', cmj);
                                if (isValidVal(abalakov)) safeSet(existing, 'power', 'abalakov', 'current', abalakov);
                                if (isValidVal(broadJump)) safeSet(existing, 'power', 'broadJump', 'current', broadJump);
                                if (isValidVal(rsi)) safeSet(existing, 'power', 'dropJump', 'rsi', rsi);

                                if (isValidVal(squat)) safeSet(existing, 'strength', 'squat', 'current', squat);
                                if (isValidVal(bench)) safeSet(existing, 'strength', 'bench', 'current', bench);
                                if (isValidVal(deadlift)) safeSet(existing, 'strength', 'deadlift', 'current', deadlift);
                                if (isValidVal(pullups)) safeSet(existing, 'strength', 'pullups', 'weight', pullups);

                                if (isValidVal(grip)) safeSet(existing, 'grappling', 'gripStrength', 'current', grip);
                                if (isValidVal(kimono)) safeSet(existing, 'grappling', 'kimonoReps', 'current', kimono);
                                if (isValidVal(kimonoTime)) safeSet(existing, 'grappling', 'kimonoTime', 'current', kimonoTime);

                            } else {
                                athleteData.evaluations.push(newEval);
                            }
                        }
                    }

                    count++;
                }

                // Helper to parse dates like DD/MM/YYYY into a comparable number
                const parseDate = (dateStr) => {
                    if (!dateStr) return 0;
                    const parts = dateStr.split('/');
                    if (parts.length === 3) {
                        return new Date(parts[2], parts[1] - 1, parts[0]).getTime();
                    }
                    const parsed = Date.parse(dateStr);
                    return isNaN(parsed) ? 0 : parsed;
                };

                // Add to batch and sort history chronologically
                for (const emailKey in athletesCache) {
                    const athleteData = athletesCache[emailKey];
                    if (athleteData.evaluations && athleteData.evaluations.length > 0) {
                        athleteData.evaluations.sort((a, b) => parseDate(a.date) - parseDate(b.date));
                    }
                    const athleteRef = db.collection('athletes').doc(emailKey);
                    batch.set(athleteRef, athleteData, { merge: true });
                }

                if (count > 0) {
                    await batch.commit();
                    setMsg(`¡Importación exitosa! Se procesaron ${count} atletas.`);
                } else {
                    setMsg("No se encontraron atletas válidos. (Revisa que la columna 'email' o 'correo' exista).");
                }
            };

            // Helper to add a new evaluation
            const handleAddEvaluation = () => {
                const today = new Date();
                const dateString = `${today.getDate()} ${today.toLocaleString('es-ES', { month: 'short' })}`;

                setFormData(prev => ({
                    ...prev,
                    evaluations: [...(prev.evaluations || []), { ...emptyEvaluation, date: dateString }]
                }));
            };

            // Helper to duplicate last evaluation (to use as baseline)
            const handleDuplicateLastEvaluation = () => {
                if (!formData.evaluations || formData.evaluations.length === 0) return handleAddEvaluation();

                const lastEval = JSON.parse(JSON.stringify(formData.evaluations[formData.evaluations.length - 1])); // deep clone
                const today = new Date();
                lastEval.date = `${today.getDate()} ${today.toLocaleString('es-ES', { month: 'short' })}`; // Update date

                setFormData(prev => ({
                    ...prev,
                    evaluations: [...prev.evaluations, lastEval]
                }));
            };

            useEffect(() => {
                // Fetch all athletes
                const unsubscribe = db.collection("athletes").onSnapshot((snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => {
                        list.push({ id: doc.id, ...doc.data() });
                    });
                    setAthletes(list);
                });
                return () => unsubscribe();
            }, []);

            const handleSelect = (athlete) => {
                const mergedAthlete = { ...emptyAthlete, ...athlete, email: athlete.id };
                // Ensure nested structures are preserved even if they don't exist in DB yet
                mergedAthlete.summary = { ...emptyAthlete.summary, ...(athlete.summary || {}) };
                if (!mergedAthlete.evaluations) mergedAthlete.evaluations = [];

                setSelectedEmail(athlete.id);
                setFormData(mergedAthlete);
                setMsg('');
            };

            const handleNew = () => {
                setSelectedEmail('NEW');
                setFormData({ ...emptyAthlete });
                setMsg('');
            };

            const handleSave = async (e) => {
                e.preventDefault();
                setSaving(true);
                setMsg('');
                try {
                    const docId = formData.email.trim();
                    if (!docId) throw new Error("Debes especificar el correo electrónico.");

                    const dataToSave = { ...formData };

                    // Always sort evaluations before manual save
                    if (dataToSave.evaluations && dataToSave.evaluations.length > 0) {
                        const parseDate = (dateStr) => {
                            if (!dateStr) return 0;
                            const parts = dateStr.split('/');
                            if (parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]).getTime();
                            const parsed = Date.parse(dateStr);
                            return isNaN(parsed) ? 0 : parsed;
                        };
                        dataToSave.evaluations.sort((a, b) => parseDate(a.date) - parseDate(b.date));
                    }

                    delete dataToSave.email; // Don't save email in body, auth is by ID
                    delete dataToSave.id;

                    await db.collection("athletes").doc(docId).set(dataToSave, { merge: true });
                    setMsg("¡Atleta guardado con éxito!");
                    if (selectedEmail === 'NEW') setSelectedEmail(docId);
                } catch (err) {
                    let errMsg = "Error al guardar: ";
                    if (err.message.includes("permission-denied")) {
                        errMsg += "Permiso denegado. Asegúrate de configurar las reglas en Firebase Firestore para permitir lectura/escritura (Test Mode).";
                    } else {
                        errMsg += err.message;
                    }
                    setMsg(errMsg);
                }
                setSaving(false);
            };

            const handleDelete = async () => {
                if (selectedEmail === 'NEW' || !selectedEmail) return;
                if (window.confirm(`¿Estás seguro de que quieres eliminar al atleta ${formData.name}? Esta acción no se puede deshacer.`)) {
                    setSaving(true);
                    try {
                        await db.collection("athletes").doc(selectedEmail).delete();
                        setMsg("¡Atleta eliminado con éxito!");
                        // clear selected email by simulating new
                        setSelectedEmail(null);
                        setFormData({ ...emptyAthlete });
                    } catch (err) {
                        let errMsg = "Error al eliminar: ";
                        if (err.message.includes("permission-denied")) {
                            errMsg += "Permiso denegado.";
                        } else {
                            errMsg += err.message;
                        }
                        setMsg(errMsg);
                    }
                    setSaving(false);
                }
            };

            // Helpers for deep updates. Paths can be something like: 'evaluations.0.power.cmj.current'
            const updateField = (path, value) => {
                const keys = path.split('.');
                setFormData(prev => {
                    const newData = { ...prev };
                    let current = newData;

                    // Arrays need explicit cloning step in this simple approach
                    if (keys[0] === 'evaluations') {
                        current.evaluations = [...current.evaluations];
                    }

                    for (let i = 0; i < keys.length - 1; i++) {
                        // handle arrays vs objects cleanly depending on whether key is number
                        const k = keys[i];
                        const nextK = keys[i + 1];
                        if (!current[k]) current[k] = isNaN(nextK) ? {} : [];
                        current[k] = Array.isArray(current[k]) ? [...current[k]] : { ...current[k] };
                        current = current[k];
                    }
                    current[keys[keys.length - 1]] = value;
                    return newData;
                });
            };

            return (
                <div className="min-h-screen flex text-white relative">
                    {/* Sidebar: List of athletes */}
                    <aside className="w-80 bg-slate-900 border-r border-slate-800 p-4 fixed h-full overflow-y-auto hidden md:block z-10">
                        <h2 className="text-2xl font-bold text-white mb-6 tracking-tight">
                            Coach<span className="text-orange-500">León</span> <span className="text-sm text-slate-400 font-normal">Admin</span>
                        </h2>
                        <div className="flex gap-2 mb-6">
                            <button
                                onClick={handleNew}
                                className="flex-1 bg-orange-600 hover:bg-orange-500 border border-orange-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-orange-600/20 transition-all text-sm"
                            >
                                + Nuevo
                            </button>
                            <button
                                type="button"
                                onClick={() => fileInputRef.current?.click()}
                                disabled={importing}
                                className="flex-1 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 text-sm disabled:opacity-50"
                            >
                                {importing ? (
                                    <span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                                ) : '📥 Importar'}
                            </button>
                            <input
                                type="file"
                                accept=".csv"
                                ref={fileInputRef}
                                onChange={handleFileUpload}
                                className="hidden"
                            />
                        </div>

                        <h3 className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Tus Atletas ({athletes.length})</h3>
                        <div className="space-y-2">
                            {athletes.map(a => (
                                <button
                                    key={a.id}
                                    onClick={() => handleSelect(a)}
                                    className={`w-full text-left px-4 py-3 rounded-xl text-sm transition-all flex items-center gap-3 ${selectedEmail === a.id ? 'bg-orange-500/10 border border-orange-500/50 text-orange-400' : 'hover:bg-slate-800 border border-transparent text-slate-300'}`}
                                >
                                    <div className="w-8 h-8 rounded-full bg-slate-800 overflow-hidden shrink-0 border border-slate-700">
                                        <img src={a.profileImg || `https://api.dicebear.com/7.x/avataaars/svg?seed=${a.name}&backgroundColor=0f172a`} alt="Avatar" className="w-full h-full object-cover" />
                                    </div>
                                    <div className="min-w-0">
                                        <div className="font-semibold truncate text-white">{a.name || 'Sin nombre'}</div>
                                        <div className="text-[10px] text-slate-500 truncate">{a.id}</div>
                                    </div>
                                </button>
                            ))}
                            {athletes.length === 0 && (
                                <p className="text-sm text-slate-500 text-center py-4 bg-slate-950 rounded-lg border border-slate-800 border-dashed">No hay atletas registrados aún.</p>
                            )}
                        </div>
                    </aside>

                    {/* Main Content: Form */}
                    <main className="flex-1 md:ml-80 p-6 md:p-10">
                        <header className="flex justify-between items-center mb-10 pb-6 border-b border-slate-800">
                            <div>
                                <h1 className="text-3xl font-bold tracking-tight">
                                    {selectedEmail === 'NEW' ? 'Crear Nuevo Atleta' : selectedEmail ? `Panel de: ${formData.name || 'Sin Nombre'}` : 'Selecciona un atleta'}
                                </h1>
                                {selectedEmail && selectedEmail !== 'NEW' && (
                                    <p className="text-sm text-slate-400 mt-1">ID: <span className="text-slate-300 font-mono">{selectedEmail}</span></p>
                                )}
                            </div>
                            <button onClick={onLogout} className="text-sm font-semibold text-slate-400 hover:text-white bg-slate-900 px-4 py-2 rounded-lg border border-slate-800 transition-colors">
                                Cerrar Sesión
                            </button>
                        </header>

                        {selectedEmail && (
                            <form onSubmit={handleSave} className="space-y-8 max-w-5xl">
                                {/* Información General */}
                                <section className="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
                                    <div className="flex items-center gap-2 mb-6 border-b border-slate-800 pb-4">
                                        <div className="w-2 h-6 bg-orange-500 rounded-full"></div>
                                        <h3 className="text-xl font-bold">Información Básica</h3>
                                        <p className="text-xs text-slate-500 font-medium ml-2 uppercase tracking-widest">(Configuración Principal)</p>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        <InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Correo Electrónico (Login ID)" path="email" placeholder="ej. usuario@correo.com" />
                                        <InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Nombre Completo" path="name" />
                                        <div className="flex flex-col">
                                            <label className="text-xs text-slate-400 mb-1 font-semibold">Estado del Atleta</label>
                                            <select
                                                value={formData.status}
                                                onChange={(e) => updateField('status', e.target.value)}
                                                className="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-orange-500 w-full"
                                            >
                                                <option value="Pendiente">Pendiente (Nuevo Registro)</option>
                                                <option value="Activo">Activo (Entrenando)</option>
                                                <option value="Competición">En Fase de Competición</option>
                                                <option value="Lesionado">Lesionado / Recuperación</option>
                                                <option value="Inactivo">Inactivo</option>
                                            </select>
                                        </div>
                                        <InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="URL Foto Perfil (Opcional)" path="profileImg" placeholder="https://..." />
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6 pt-6 border-t border-slate-800/50">
                                        <InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Peso Corporal" path="summary.bodyWeight" placeholder="ej. 75 kg" />
                                        <InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Fuerza Relativa" path="summary.relativeStrength" placeholder="ej. 2.5x BW" />
                                        <InputField formData={formData} selectedEmail={selectedEmail} updateField={updateField} label="Próximo Objetivo" path="summary.nextGoal" placeholder="ej. Torneo Suramericano" />
                                    </div>
                                </section>

                                {/* Evaluaciones de Solo Lectura */}
                                {formData.evaluations && formData.evaluations.length > 0 && (
                                    <section className="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
                                        <div className="flex items-center justify-between mb-6 border-b border-slate-800 pb-4">
                                            <div className="flex items-center gap-2">
                                                <div className="w-2 h-6 bg-blue-500 rounded-full"></div>
                                                <h3 className="text-xl font-bold">Historial de Evaluaciones</h3>
                                                <p className="text-xs text-slate-500 font-medium ml-2 uppercase tracking-widest hidden md:block">(Lectura desde el Excel)</p>
                                            </div>
                                            <div className="text-xs font-bold bg-slate-800 text-slate-400 px-3 py-1 rounded-full">{formData.evaluations.length} Registros</div>
                                        </div>

                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                            {/* We slice and reverse safely strictly for UI to show latest first */}
                                            {[...formData.evaluations].reverse().map((ev, i) => (
                                                <div key={i} className="bg-slate-950 p-4 rounded-xl border border-slate-800 shadow-md">
                                                    <div className="font-bold text-orange-500 mb-3 border-b border-slate-800 pb-2 flex justify-between items-center">
                                                        <span className="flex items-center gap-2"><svg className="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg> {ev.date || 'Sin Fecha'}</span>
                                                        <span className="text-[10px] text-slate-400 font-mono">#{formData.evaluations.length - i}</span>
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-x-2 gap-y-1 text-xs text-slate-300">
                                                        {ev.power?.cmj?.current && <p><span className="text-slate-500 font-medium">CMJ:</span> {ev.power.cmj.current}</p>}
                                                        {ev.power?.dropJump?.rsi && <p><span className="text-slate-500 font-medium">RSI:</span> {ev.power.dropJump.rsi}</p>}
                                                        {ev.power?.abalakov?.current && <p><span className="text-slate-500 font-medium">Aba:</span> {ev.power.abalakov.current}</p>}
                                                        {ev.power?.broadJump?.current && <p><span className="text-slate-500 font-medium">Horiz:</span> {ev.power.broadJump.current}</p>}
                                                        {ev.strength?.squat?.current && <p><span className="text-slate-500 font-medium">Squat:</span> {ev.strength.squat.current}</p>}
                                                        {ev.strength?.bench?.current && <p><span className="text-slate-500 font-medium">Bench:</span> {ev.strength.bench.current}</p>}
                                                        {ev.strength?.deadlift?.current && <p><span className="text-slate-500 font-medium">Dead:</span> {ev.strength.deadlift.current}</p>}
                                                        {ev.grappling?.gripStrength?.current && <p className="col-span-2"><span className="text-slate-500 font-medium">Grip:</span> {ev.grappling.gripStrength.current}</p>}
                                                        {ev.grappling?.kimonoReps?.current && <p><span className="text-slate-500 font-medium">Gi Rep:</span> {ev.grappling.kimonoReps.current}</p>}
                                                        {ev.grappling?.kimonoTime?.current && <p><span className="text-slate-500 font-medium">Gi Sec:</span> {ev.grappling.kimonoTime.current}</p>}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                )}                                {/* FIXED ACTION BAR at the bottom */}
                                <div className="sticky bottom-4 z-50 bg-slate-900/90 backdrop-blur border border-slate-800 p-4 rounded-2xl shadow-2xl flex items-center justify-between mt-10">
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700">
                                            <img src={formData.profileImg || `https://api.dicebear.com/7.x/avataaars/svg?seed=${formData.name}&backgroundColor=0f172a`} alt="" className="w-10 h-10 rounded-full" />
                                        </div>
                                        <div>
                                            <p className="text-sm font-bold">{formData.name || 'Atleta Sin Nombre'}</p>
                                            <p className="text-xs text-slate-500">{formData.email || 'Complete el email'}</p>
                                        </div>
                                    </div>

                                    <div className="flex items-center gap-4">
                                        {msg && (
                                            <div className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 animate-bounce ${msg.includes('Error') ? 'bg-red-500/10 text-red-500 border border-red-500/20' : 'bg-green-500/10 text-green-500 border border-green-500/20'}`}>
                                                {msg.includes('Error') ? '❌' : '✅'} {msg}
                                            </div>
                                        )}
                                        <button
                                            type="button"
                                            onClick={handleDelete}
                                            disabled={saving || selectedEmail === 'NEW'}
                                            className="bg-red-600/20 hover:bg-red-600/40 text-red-500 font-bold py-3 px-6 rounded-xl disabled:opacity-50 transition-all shadow-lg text-sm border border-red-500/20"
                                        >
                                            Eliminar Atleta
                                        </button>
                                        <button
                                            type="submit"
                                            disabled={saving}
                                            className="bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 px-10 rounded-xl disabled:opacity-50 transition-all shadow-lg shadow-orange-600/30 text-lg flex items-center gap-2"
                                        >
                                            {saving ? (
                                                <><span className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span> Guardando...</>
                                            ) : (
                                                'Guardar Cambios en Base de Datos'
                                            )}
                                        </button>
                                    </div>
                                </div>
                            </form>
                        )}

                        {!selectedEmail && (
                            <div className="flex flex-col items-center justify-center h-[60vh] text-slate-500 border-2 border-dashed border-slate-800 rounded-3xl">
                                <h2 className="text-2xl font-bold mb-2">Bienvenido, Coach León</h2>
                                <p>Selecciona un atleta del panel lateral izquierdo para ver y editar sus métricas.</p>
                                <button
                                    onClick={handleNew}
                                    className="mt-6 bg-slate-800 hover:bg-slate-700 text-white font-semibold py-2 px-6 rounded-lg transition-colors border border-slate-700"
                                >
                                    O registra un nuevo atleta aquí
                                </button>
                            </div>
                        )}
                    </main>
                </div>
            )
        }

        const LoginView = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (err) {
                    setError("Acceso denegado. Credenciales incorrectas.");
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-950 p-4">
                    <form onSubmit={handleSubmit} className="bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-2xl w-full max-w-sm">
                        <div className="text-center mb-8">
                            <h2 className="text-3xl font-bold text-white tracking-tight">Coach<span className="text-orange-500">León</span></h2>
                            <p className="text-orange-500/80 text-sm font-semibold uppercase tracking-widest mt-1">Panel de Administrador</p>
                        </div>

                        <div className="space-y-5">
                            <div>
                                <label className="block text-xs uppercase text-slate-400 font-semibold mb-2">Correo Autenticado</label>
                                <input
                                    type="email"
                                    value={email} onChange={e => setEmail(e.target.value)}
                                    placeholder="tu@correo.com"
                                    className="w-full bg-slate-950 border border-slate-700 rounded-xl py-3 px-4 focus:outline-none focus:border-orange-500 text-white transition-colors"
                                    required
                                />
                            </div>
                            <div>
                                <label className="block text-xs uppercase text-slate-400 font-semibold mb-2">Contraseña</label>
                                <input
                                    type="password"
                                    value={password} onChange={e => setPassword(e.target.value)}
                                    placeholder="••••••••"
                                    className="w-full bg-slate-950 border border-slate-700 rounded-xl py-3 px-4 focus:outline-none focus:border-orange-500 text-white transition-colors"
                                    required
                                />
                            </div>

                            {error && <p className="text-red-500 text-sm text-center bg-red-500/10 py-2 rounded-lg border border-red-500/20">{error}</p>}

                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 rounded-xl mt-4 shadow-lg shadow-orange-600/20 disabled:opacity-50 transition-colors"
                            >
                                {loading ? 'Validando...' : 'Acceder al Gestor'}
                            </button>
                        </div>
                    </form>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            if (loading) return (
                <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center">
                    <div className="w-12 h-12 border-4 border-slate-800 border-t-orange-500 rounded-full animate-spin"></div>
                </div>
            );

            return user ? <AdminDashboard user={user} onLogout={() => auth.signOut()} /> : <LoginView />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
